        <div><div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.07em;margin-bottom:5px">TEMPLATE ID</div>
          <input placeholder="template_xxxxx" value="${cfg.templateId}" oninput="alertConfig.templateId=this.value"/>
        </div>
        <div><div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.07em;margin-bottom:5px">PUBLIC KEY</div>
          <input placeholder="xxxxxxxxxxxx" value="${cfg.publicKey}" oninput="alertConfig.publicKey=this.value"/>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="alertConfig.configured=!!(alertConfig.email&&alertConfig.serviceId&&alertConfig.templateId&&alertConfig.publicKey);saveAlertConfig();showAlertToast(alertConfig.configured?'EmailJS saved!':'Fill in all 4 fields',alertConfig.configured?'success':'warning');render()">Save EmailJS Settings</button>
        ${cfg.configured?`<button style="background:rgba(0,212,170,.1);border:.5px solid rgba(0,212,170,.3);border-radius:8px;padding:8px 16px;color:#00D4AA;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit" onclick="sendAlertEmail('🎣 TideStrike Test','Test email from TideStrike — EmailJS is working!'.split(),'Test').then(ok=>showAlertToast(ok?'Test email sent!':'Failed — check your EmailJS settings',ok?'success':'error'))">Send Test Email</button>`:''}
      </div>
    </div>
  </div>`;

  // ── CHECK NOW ──
  html+=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <button id="checkNowBtn" class="btn" onclick="checkAllAlerts(true)" ${!cfg.configured||!currentWeather?'style="opacity:.5"':''}>🔍 Check Now Against Current Conditions</button>
    ${!currentWeather?`<span style="font-size:12px;color:rgba(255,255,255,.35)">Search a beach first</span>`:''}
    ${currentWeather?`<span style="font-size:12px;color:rgba(255,255,255,.35)">Checking ${currentLocation?.n||'current location'}</span>`:''}
  </div>`;

  // ── CREATE ALERT ──
  const fishOptions = Object.entries(FISH).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  const sectionStyle = 'background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px';
  const labelStyle = 'font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.35);margin-bottom:10px;display:flex;align-items:center;gap:8px';
  const checkStyle = 'width:16px;height:16px;accent-color:#00D4AA;flex-shrink:0';
  html+=`<div class="card" style="margin-bottom:16px">
    <div style="font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.35);margin-bottom:16px">CREATE NEW ALERT</div>
    <div style="display:flex;flex-direction:column;gap:14px">

      <!-- Alert name -->
      <div><div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.07em;margin-bottom:5px">ALERT NAME</div>
        <input id="alertName" placeholder="e.g. Snapper at City Beach" style="width:100%"/>
      </div>

      <!-- Fish -->
      <div style="${sectionStyle}">
        <div style="${labelStyle}">🐟 FISH SPECIES</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Species</div>
            <select id="alertFish" style="width:100%"><option value="">— Any —</option>${fishOptions}</select>
          </div>
          <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Min Rating</div>
            <select id="alertFishRating" style="width:100%">
              <option value="7">GOOD (7+)</option>
              <option value="8">GREAT (8+)</option>
              <option value="9">EXCELLENT (9+)</option>
              <option value="10">PERFECT only</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Wind -->
      <div style="${sectionStyle}">
        <label style="${labelStyle}">
          <input type="checkbox" id="alertWindEnabled" ${checkStyle}/>
          💨 WIND CONDITIONS
        </label>
        <div style="display:flex;flex-direction:column;gap:10px;padding-left:4px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Max wind (km/h)</div>
              <input id="alertWindMax" type="number" placeholder="e.g. 20" min="0" max="100" style="width:100%"/>
            </div>
            <div style="padding-top:18px;display:flex;flex-direction:column;gap:6px">
              <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer">
                <input type="checkbox" id="alertWindOnshore" style="${checkStyle};accent-color:#F87171"/> Onshore only
              </label>
              <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer">
                <input type="checkbox" id="alertWindOffshore" style="${checkStyle};accent-color:#00D4AA"/> Offshore only
              </label>
            </div>
          </div>
          <div style="font-size:11px;color:rgba(255,255,255,.28)">Leave max wind blank to alert on direction only</div>
        </div>
      </div>

      <!-- Weather / Sky -->
      <div style="${sectionStyle}">
        <label style="${labelStyle}">
          <input type="checkbox" id="alertWeatherEnabled" ${checkStyle}/>
          ⛅ WEATHER / SKY CONDITIONS
        </label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;padding-left:4px">
          ${[
            {val:0,  label:'☀️ Clear / Sunny'},
            {val:10, label:'🌤 Partly Cloudy'},
            {val:3,  label:'☁️ Overcast'},
            {val:50, label:'🌧 Rain / Showers'},
            {val:95, label:'⛈ Storm'},
          ].map(w=>`<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;background:rgba(255,255,255,.04);border-radius:8px;padding:6px 10px;border:.5px solid rgba(255,255,255,.08)">
            <input type="checkbox" class="alertWeatherCode" value="${w.val}" style="${checkStyle}"/> ${w.label}
          </label>`).join('')}
        </div>
      </div>

      <!-- Swell -->
      <div style="${sectionStyle}">
        <label style="${labelStyle}">
          <input type="checkbox" id="alertSwellEnabled" ${checkStyle}/>
          🌊 SWELL HEIGHT
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-left:4px">
          <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Minimum (m)</div>
            <input id="alertSwellMin" type="number" placeholder="e.g. 0.5" min="0" max="8" step="0.1" style="width:100%"/>
          </div>
          <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Maximum (m)</div>
            <input id="alertSwellMax" type="number" placeholder="e.g. 2.0" min="0" max="8" step="0.1" style="width:100%"/>
          </div>
        </div>
      </div>

      <!-- Barometric pressure -->
      <div style="${sectionStyle}">
        <label style="${labelStyle}">
          <input type="checkbox" id="alertPressureEnabled" ${checkStyle}/>
          📊 BAROMETRIC PRESSURE
        </label>
        <div style="display:flex;flex-direction:column;gap:10px;padding-left:4px">
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;background:rgba(0,212,170,.06);border-radius:8px;padding:6px 10px;border:.5px solid rgba(0,212,170,.15)">
              <input type="checkbox" id="alertFalling" style="${checkStyle}"/> 📉 Falling (pre-frontal)
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;background:rgba(250,204,21,.05);border-radius:8px;padding:6px 10px;border:.5px solid rgba(250,204,21,.15)">
              <input type="checkbox" id="alertRising" style="${checkStyle};accent-color:#FACC15"/> 📈 Rising (post-frontal)
            </label>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Alert below (hPa)</div>
              <input id="alertPressureBelow" type="number" placeholder="e.g. 1005" min="950" max="1050" style="width:100%"/>
            </div>
            <div><div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px">Alert above (hPa)</div>
              <input id="alertPressureAbove" type="number" placeholder="e.g. 1025" min="950" max="1050" style="width:100%"/>
            </div>
          </div>
        </div>
      </div>

      <!-- Tide phase -->
      <div style="${sectionStyle}">
        <label style="${labelStyle}">
          <input type="checkbox" id="alertTideEnabled" ${checkStyle}/>
          🌊 TIDE PHASE
        </label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;padding-left:4px">
          ${['incoming','outgoing','high','low'].map(phase=>`<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;background:rgba(255,255,255,.04);border-radius:8px;padding:6px 12px;border:.5px solid rgba(255,255,255,.08)">
            <input type="checkbox" class="alertTidePhase" value="${phase}" style="${checkStyle}"/> ${phase.charAt(0).toUpperCase()+phase.slice(1)}
          </label>`).join('')}
        </div>
      </div>

      <!-- Golden window -->
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;background:rgba(250,204,21,.05);border:.5px solid rgba(250,204,21,.2);border-radius:12px;padding:12px 14px">
        <input type="checkbox" id="alertGolden" style="width:18px;height:18px;accent-color:#FACC15;flex-shrink:0"/>
        <div>
          <div style="font-size:13px;font-weight:600;color:#FACC15">✨ Golden Window Alert</div>
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">Alert when peak tidal flow overlaps with dawn, dusk or moonrise within 2 hours</div>
        </div>
      </label>

      <button class="btn" onclick="addNewAlert()">+ Save Alert</button>
    </div>
  </div>`;

  // ── SAVED ALERTS ──
  if(savedAlerts.length===0){
    html+=`<div style="text-align:center;padding:24px;color:rgba(255,255,255,.22);font-size:13px">No alerts saved yet. Create one above.</div>`;
  } else {
    html+=`<div style="font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:10px">SAVED ALERTS (${savedAlerts.length})</div>`;
    html+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">`;
    const ratingLabels={7:'GOOD+',8:'GREAT+',9:'EXCELLENT+',10:'PERFECT'};
    savedAlerts.forEach(al=>{
      const fd = al.fishKey ? FISH[al.fishKey] : null;
      const bs = 'border-radius:6px;padding:3px 9px;font-size:11px;border:.5px solid ';
      const badges = [
        fd ? `<span style="background:rgba(0,212,170,.08);${bs}rgba(0,212,170,.25);color:#00D4AA">🐟 ${fd.label} ${ratingLabels[al.fishMinRating]||''}</span>` : '',
        al.windEnabled && al.windMax ? `<span style="background:rgba(255,255,255,.05);${bs}rgba(255,255,255,.1);color:rgba(255,255,255,.6)">💨 Wind &lt;${al.windMax}km/h${al.windDirOnshore?' onshore':al.windDirOffshore?' offshore':''}</span>` : '',
        al.windEnabled && !al.windMax && (al.windDirOnshore||al.windDirOffshore) ? `<span style="background:rgba(255,255,255,.05);${bs}rgba(255,255,255,.1);color:rgba(255,255,255,.6)">💨 ${al.windDirOnshore?'Onshore':'Offshore'} wind</span>` : '',
        al.weatherEnabled && al.weatherCodes?.length ? `<span style="background:rgba(255,255,255,.05);${bs}rgba(255,255,255,.1);color:rgba(255,255,255,.6)">⛅ ${al.weatherCodes.length} sky condition${al.weatherCodes.length>1?'s':''}</span>` : '',
        al.swellEnabled && al.swellMin!=null ? `<span style="background:rgba(96,165,250,.06);${bs}rgba(96,165,250,.2);color:#60A5FA">🌊 Swell ${al.swellMin}–${al.swellMax}m</span>` : '',
        al.pressureEnabled && al.fallingPressure ? `<span style="background:rgba(0,212,170,.06);${bs}rgba(0,212,170,.2);color:#4ADE80">📉 Falling pressure</span>` : '',
        al.pressureEnabled && al.risingPressure ? `<span style="background:rgba(250,204,21,.06);${bs}rgba(250,204,21,.2);color:#FACC15">📈 Rising pressure</span>` : '',
        al.pressureEnabled && al.pressureBelow ? `<span style="background:rgba(255,255,255,.05);${bs}rgba(255,255,255,.1);color:rgba(255,255,255,.6)">📊 Below ${al.pressureBelow}hPa</span>` : '',
        al.pressureEnabled && al.pressureAbove ? `<span style="background:rgba(255,255,255,.05);${bs}rgba(255,255,255,.1);color:rgba(255,255,255,.6)">📊 Above ${al.pressureAbove}hPa</span>` : '',
        al.tideEnabled && al.tidePhases?.length ? `<span style="background:rgba(0,212,170,.06);${bs}rgba(0,212,170,.15);color:#00D4AA">🌊 ${al.tidePhases.map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(' / ')} tide</span>` : '',
        al.goldenWindow ? `<span style="background:rgba(250,204,21,.08);${bs}rgba(250,204,21,.25);color:#FACC15">✨ Golden Window</span>` : '',
      ].filter(Boolean);
      html+=`<div style="background:rgba(255,255,255,.03);border:.5px solid ${al.active?'rgba(0,212,170,.2)':'rgba(255,255,255,.07)'};border-radius:12px;padding:14px 16px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:${badges.length?'10px':'0'}">
          <div style="font-size:14px;font-weight:600;color:${al.active?'#E8EDF2':'rgba(255,255,255,.4)'}">${al.name}</div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button onclick="toggleAlertActive(${al.id})" style="background:${al.active?'rgba(0,212,170,.1)':'rgba(255,255,255,.05)'};border:.5px solid ${al.active?'rgba(0,212,170,.3)':'rgba(255,255,255,.12)'};border-radius:8px;padding:5px 10px;color:${al.active?'#00D4AA':'rgba(255,255,255,.3)'};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">${al.active?'ON':'OFF'}</button>
            <button onclick="deleteAlert(${al.id})" style="background:rgba(248,113,113,.07);border:.5px solid rgba(248,113,113,.2);border-radius:8px;padding:5px 10px;color:#F87171;font-size:11px;cursor:pointer;font-family:inherit">✕</button>
          </div>
        </div>
        ${badges.length?`<div style="display:flex;flex-wrap:wrap;gap:5px">${badges.join('')}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  // ── ALERT LOG ──
  if(alertLog.length>0){
    html+=`<div style="font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:8px">RECENT ALERT LOG</div>`;
    html+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    [...alertLog].reverse().slice(0,10).forEach(log=>{
      const d=new Date(log.time);
      html+=`<div style="background:rgba(255,255,255,.02);border:.5px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 12px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
          <span style="font-size:12px;font-weight:500">${log.alertName}</span>
          <span style="font-size:10px;color:rgba(255,255,255,.25)">${d.toLocaleDateString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:3px">${log.beach}</div>
        ${log.triggers.map(t=>`<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px">${t}</div>`).join('')}
        <div style="margin-top:5px">
          <span style="font-size:10px;font-weight:600;color:${log.sent?'#00D4AA':'#F87171'}">${log.sent?'✓ Email sent':'✗ Email failed'}</span>
          ${log.manual?`<span style="font-size:10px;color:rgba(255,255,255,.25);margin-left:8px">manual check</span>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  return html;
}


function renderAuth(){
  const isLogin=authMode==="login";
  return `<div style="max-width:400px;margin:0 auto">
    <div class="fade-up" style="text-align:center;margin-bottom:28px">
      <div class="section-label">${isLogin?"WELCOME BACK":"JOIN TIDESTRIKE"}</div>
      <div class="section-title">${isLogin?"Sign in":"Create account"}</div>
    </div>
    <div class="card" style="padding:26px">
      ${!isLogin?`<div style="margin-bottom:14px"><div style="font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.07em;margin-bottom:6px">NAME</div><input id="authName" placeholder="Your name" value="${authForm.name}" oninput="authForm.name=this.value"/></div>`:""}
      <div style="margin-bottom:14px"><div style="font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.07em;margin-bottom:6px">EMAIL</div><input id="authEmail" type="email" placeholder="you@example.com" value="${authForm.email}" oninput="authForm.email=this.value"/></div>
      <div style="margin-bottom:22px"><div style="font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.07em;margin-bottom:6px">PASSWORD</div><input id="authPass" type="password" placeholder="••••••••" value="${authForm.password}" oninput="authForm.password=this.value" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div id="authError" style="color:#F87171;font-size:13px;margin-bottom:14px;display:none"></div>
      <button class="btn" style="width:100%;margin-bottom:14px" onclick="doLogin()">${isLogin?"Sign in →":"Create account →"}</button>
      <div style="text-align:center"><button onclick="toggleAuthMode()" style="background:transparent;border:none;color:rgba(255,255,255,.32);font-size:13px;cursor:pointer;font-family:inherit">${isLogin?"Don't have an account? Register":"Already have an account? Sign in"}</button></div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════ */


function render(){
  renderNav();
  const main=el("mainContent");
  switch(currentView){
    case"home":     main.innerHTML=renderHome();break;
    case"guide":    main.innerHTML=renderGuide();break;
    case"ikejime":  main.innerHTML=renderIkeJime();break;
    case"knots":    main.innerHTML=renderKnots();break;
    case"alerts":   main.innerHTML=renderAlerts();break;
    case"auth":     main.innerHTML=renderAuth();break;
    default:        main.innerHTML=renderHome();
  }
  // Fish modal is a global overlay — works from any page
  let overlay=el("fishModalOverlay");
  if(!overlay){
    overlay=document.createElement("div");
    overlay.id="fishModalOverlay";
    document.body.appendChild(overlay);
  }
  overlay.innerHTML=activeFishModal?renderFishModal(activeFishModal):"";
}

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
function switchTab(t){currentTab=t;render();}
function signOut(){currentUser=null;render();}

// Show conditions dashboard for a specific species
function showSpeciesDash(key){
  if(!currentWeather) return;
  const sc=scoreConditions(key,currentWeather,currentMoon?currentMoon.phase:null);
  const fd=FISH[key];

  // Highlight active button, deactivate others
  document.querySelectorAll('[id^="species-btn-"]').forEach(btn=>{
    const k=btn.id.replace('species-btn-','');
    const isThis=(k===key);
    const isTop=currentAI?.topTargets?.some(t=>t.fish.toLowerCase()===(FISH[k]?.label||'').toLowerCase());
    btn.style.background=isThis?"rgba(0,212,170,.12)":isTop?"rgba(0,212,170,.05)":"rgba(255,255,255,.03)";
    btn.style.borderColor=isThis?"rgba(0,212,170,.5)":isTop?"rgba(0,212,170,.2)":"rgba(255,255,255,.07)";
  });

  const dashEl=document.querySelector('[data-conddash]');
  if(!dashEl) return;
  dashEl.scrollIntoView({behavior:'smooth',block:'nearest'});

  const factors=sc.factors;
  let inner=`<div style="font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.35);margin-bottom:12px">CONDITIONS DASHBOARD — ${fd?.label?.toUpperCase()||key.toUpperCase()} <span style="color:rgba(255,255,255,.2);font-weight:400">TAP A SPECIES ABOVE TO UPDATE</span></div>`;

  // Verdict summary at top
  inner+=buildDashVerdict(key,sc);

  inner+=`<div style="display:flex;flex-direction:column;gap:8px">`;
  factors.forEach(f=>{
    const barW=Math.round(f.score/10*100);
    const barC=f.score>=8?"#00D4AA":f.score>=6?"#4ADE80":f.score>=4?"#FACC15":"#F87171";
    inner+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;color:rgba(255,255,255,.65)">${f.icon} ${f.name}</span><span style="font-size:12px;color:rgba(255,255,255,.45)">${f.value}</span></div><div style="height:7px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;margin-bottom:4px"><div style="height:100%;width:${barW}%;background:${barC};border-radius:3px;transition:width .4s"></div></div><div style="font-size:11px;color:rgba(255,255,255,.42);line-height:1.4">${f.detail}</div></div>`;
  });
  inner+=`</div>`;
  
  dashEl.innerHTML=inner;
}


function toggleAuthMode(){authMode=authMode==="login"?"register":"login";render();}
function doLogin(){
  if(!authForm.email||!authForm.password){
    const err=el("authError"); if(err){err.textContent="Please fill in all fields";err.style.display="block";}
    return;
  }
  currentUser={name:authForm.name||authForm.email.split("@")[0],email:authForm.email};
  setView("alerts");
}

function toggleAlertDay(day){
  if(alertForm.days.includes(day))alertForm.days=alertForm.days.filter(d=>d!==day);
  else alertForm.days=[...alertForm.days,day];
  render();
}
function addAlert(){
  if(!alertForm.location)return;
  alerts.push({...alertForm,days:[...alertForm.days],id:Date.now()});
  alertForm.location=""; render();
}
function removeAlert(i){alerts.splice(i,1);render();}

// Close dropdown on outside click
document.addEventListener("click",function(e){
  const wrap=el("searchDropdown");
  if(wrap&&!wrap.contains(e.target)&&e.target.id!=="searchInput"){
    dropdownVisible=false;
    if(wrap)wrap.style.display="none";
  }
});

// Init
render();
</script>
