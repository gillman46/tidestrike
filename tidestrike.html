    techniques:[
      {name:"Low tide edge fishing",detail:"On the low tide, walk the beach to identify where sand meets rock or weed. Fish these edges with unweighted or lightly weighted baits on the incoming tide as bream move in from deeper water."},
      {name:"The drift",detail:"In gutters with current, let the unweighted bait drift naturally with the flow. Bream ambush prey carried by the current — a natural presentation is far more effective than anchored bait."},
      {name:"Stealth",detail:"Bream are highly cautious. Wade carefully, avoid disturbing the bottom, keep shadows off the water and use the lightest possible gear. Spooked bream won't bite."},
    ],
    tips:["Less is more with bream — downsize everything when not getting bites","Fluorocarbon leader is essential in clear water — bream can see mono","The exact transition zone (sand-to-weed, sand-to-rock) will hold far more fish than open sand","Incoming tide over the low-tide mark is consistently the most productive window","Change baits after 10–15 minutes if not getting bites — fresh bait scent matters"],
    legal:"NSW: 25cm. QLD: 25cm. WA: 25cm. Bag limits typically 20 per person per day.",
    eating:"Good eating — sweet, firm white flesh. Best pan-fried or baked whole. Smaller fish (under 35cm) are better eating than large ones.",
  },
  snapper: {
    label:"Snapper", icon:"🦈", aka:"Red bream, pinkies (small), squire",
    description:"Snapper (Chrysophrys auratus) are one of Australia's most prized beach and inshore fish — a powerful, hard-fighting species with a reputation for being both selective and opportunistic. From land-based surf beaches to headlands, piers and rock platforms, snapper offer world-class sport fishing accessible to all Australians.",
    seasons:"WA: September–March are peak snapper months from the beach. East coast: April–September sees large fish moving inshore in NSW/QLD. Year-round in QLD tropical waters.",
    habitat:"Rocky headlands and reef edges adjacent to sandy ground, deep surf gutters especially those near rock structure, offshore reefs and drop-offs. In WA, metro beach snapper fishing (Cottesloe–Trigg corridor) is legendary.",
    findingFish:"Target rocky headlands and reefs that drop into deeper water. Deep surf gutters adjacent to rocks hold fish. Look for structure — isolated reef, bommies, or reef edges that adjoin sandy ground are prime ambush points. In WA metro beaches, cast to the edge of limestone reef systems.",
    baits:["Fresh squid (whole or strip)","Fresh pilchard (whole, on ganged hook)","Herring / yellowtail","Slimy mackerel (whole or fillet)","Fresh mullet strip","Prawn (large whole)"],
    rigs:[
      {name:"Running Sinker Rig",detail:"Ball sinker running on 15–20lb mainline, barrel swivel, 60–100cm of 20–30lb fluorocarbon leader to a size 4/0–6/0 circle hook. Circle hooks give better hook-up rates and are kinder on the fish if releasing."},
      {name:"Paternoster Rig",detail:"Two-hook paternoster with 4/0–6/0 hooks, 30kg trace, star sinker to hold position. Best in current or when presenting two baits at different levels. Good from headlands with current."},
      {name:"Live Bait Rig",detail:"Live herring, yellowtail or small mullet pinned through the back behind the dorsal fin on a 4/0–6/0 hook, running sinker or unweighted. The deadliest technique when fish are present."},
    ],
    tackle:"10–13ft surf rod, 6000–10000 spinning reel, 20–30lb mainline. Leader 30–50lb fluorocarbon 1–1.5m. Wire trace is rarely needed for snapper. The rod needs to handle 50–200g sinkers.",
    techniques:[
      {name:"Berleying",detail:"Set up a consistent berley trail with minced pilchard, tuna oil or pilchard oil before casting. Build the trail for 15–20 minutes before starting to fish. Keep the berley flowing throughout the session — a continuous trail anchors fish."},
      {name:"Fresh bait presentation",detail:"Snapper are selective — fresh bait dramatically outperforms frozen. When using pilchards, hook through the nose or jaw and keep the bait straight. Twisted or bunched baits catch far fewer fish."},
      {name:"Night fishing",detail:"Snapper are predominantly nocturnal feeders from land-based positions. The best sessions are typically after dark, peaking from 10pm to 2am. Dusk and dawn transitions are also productive."},
    ],
    tips:["Fresh bait is non-negotiable — bring a quality esky and keep everything cold","Be patient with berley — 20 minutes of pre-baiting before your first cast pays dividends","Cast to the edge of reef rather than onto it — snapper patrol the sand-to-reef transition","Running sinker rigs allow the fish to take the bait without feeling resistance — critical for line-shy fish","Check your WA or NSW bag limit — regulations vary significantly between states"],
    legal:"NSW: 30cm, bag limit 10. QLD: 35cm, bag limit 10. WA: 41cm, bag limit varies by zone. SA: 35cm. Always check current local regulations.",
    eating:"Premium eating fish — one of Australia's finest table fish. Firm, white, delicate flesh. Suits whole baking, pan-frying, BBQ, sashimi. Scale and gut as soon as practical.",
  },
  flathead: {
    label:"Flathead", icon:"🐟", aka:"Dusky flathead, lizard, flattie",
    description:"Dusky flathead (Platycephalus fuscus) are Australia's most commonly caught sport fish — a quintessential summer target found on sand flats, gutters and estuaries from NSW to QLD. They are ambush predators that lie motionless on sandy bottoms, exploding upwards to engulf prey. Surprisingly hard fighters when hooked on light tackle.",
    seasons:"Year-round but peak October–March in NSW/QLD. Spring and early summer see large fish (over 70cm) moving onto shallow flats and surf gutters to feed. Autumn is prime for large 'doormat' flathead.",
    habitat:"Sandy gutters on surf beaches, sand flats in estuaries near weed edges, channels near rocky structure, shallow sandy bays. Water depths of 0.5–3m with sandy bottom and nearby weed or structure.",
    findingFish:"Find the transition zone — where open sand meets weed beds, rock edges or the gutter edge. Flathead position themselves with the current in these spots to intercept prey. Low tide reveals the gutters clearly; fish them on the run-in as water floods back over the flats.",
    baits:["Soft plastic (the #1 technique)","Live poddy mullet","Live hardihead","Pilchard (fresh, whole)","Mullet strip","Herring strip","Small live bream"],
    rigs:[
      {name:"Soft Plastic Jighead Rig",detail:"1/8–1/2oz jighead (depending on depth/current), size 1/0–4/0 wide-gap hook. Thread 4–6\" paddle tail, curl tail or grub straight on the hook. Colour: natural (brown, olive, white, pearl) in clear water; bright (chartreuse, orange) in dirty water."},
      {name:"Running Sinker Rig (bait)",detail:"Ball sinker running on 8–15lb mainline, swivel, 50cm of 10–15lb fluorocarbon leader to a 2/0–4/0 wide-gap hook. Keep sinker as light as possible."},
      {name:"Unweighted Live Bait",detail:"Live poddy mullet or hardihead on a 2/0 hook through the back, allowed to swim freely on the surface or mid-water with no sinker. Devastating for large flathead on shallow flats."},
    ],
    tackle:"7–9ft light-medium spin rod, 2500–4000 reel, 8–15lb braid mainline (braid is preferred for feel when fishing soft plastics), 10–20lb fluorocarbon leader 60cm–1m.",
    techniques:[
      {name:"Soft plastic hopping",detail:"Cast the soft plastic and let it sink to the bottom. Count it down. Then lift the rod sharply 30–60cm (the 'hop'), wind in the slack as the plastic falls, wait for it to hit bottom again. Repeat. Most strikes occur as the plastic falls — keep the line semi-taut on the fall and watch for any twitch or weight."},
      {name:"Slow roll",detail:"Cast and slowly wind the plastic just off the bottom in a steady retrieve. Flathead often hit a slow-rolling paddle tail — the wobbling tail triggers reaction strikes."},
      {name:"Current positioning",detail:"Flathead face into the current — cast up-current and drift the bait back towards you and the fish. A bait or lure that washes naturally down the current is far more convincing than one retrieved against it."},
    ],
    tips:["Flathead have sharp spines on the gill plates and top of the head — always grip firmly from behind the head when unhooking","The pause on the fall is where most strikes occur — keep slight tension on the line","Polarised sunglasses reveal flathead lying on the bottom — sight-fishing is extremely effective on shallow sunny flats","Large flathead (over 60cm) are most common in the cooler months — target them differently to schoolies","Always measure fish — large flathead (60–70cm) are often breeding females and best released"],
    legal:"NSW: 36cm minimum, maximum size 70cm (large breeding females protected). QLD: 40cm. VIC: 30cm. Bag limits typically 5–10 per person.",
    eating:"Excellent — firm, white, boneless fillets. Suits any cooking method. Smaller fish (35–50cm) have the best flavour; very large fish can be coarser.",
  },
  mulloway: {
    label:"Mulloway", icon:"🐋", aka:"Jewfish, jewie, silver ghost, fish of a thousand casts",
    description:"Mulloway (Argyrosomus japonicus) are the holy grail of Australian beach fishing — a massive, powerful predator that can exceed 1.8m and 70kg. Known as the 'silver ghost' for their elusive nature, they are one of the most challenging and rewarding species to target. Many dedicated anglers spend years chasing their first. They are found from WA right around the southern half of Australia to QLD.",
    seasons:"Year-round but prime large-fish season varies. NSW: autumn–winter (March–August) for trophy fish. SA/WA: year-round with peak winter runs. Juvenile 'soapies' (school fish) can be caught year-round.",
    habitat:"Deep surf gutters on exposed beaches, river mouths and estuary channels, breakwalls, rocky headlands adjacent to deep water. They hunt along defined 'routes' — regular paths between feeding areas. Deep holes near structure are key locations.",
    findingFish:"Locate deep gutters — not the shallow ones that hold whiting and tailor, but deep, dark channels between sandbars that hold water even at low tide. Beaches where you can drive are perfect for covering ground. Mulloway also hunt along breakwalls and near rocky headlands. The best spots have depth, structure, and an exit route to deeper water. Spend time at low tide studying the beach to find these gutters before dark.",
    baits:["Live mullet (the #1 bait — nothing beats it)","Live tailor","Fresh squid (whole or large strip)","Fresh yellowtail / slimy mackerel","Whole fresh pilchard (large)","Fresh herring (yellowtail)","Large beach worm bunches (surf fishing)"],
    rigs:[
      {name:"Running Sinker Rig (standard)",detail:"Ball or star sinker running on 30–50lb mainline, three-way swivel, 1–1.5m of 50–80lb monofilament or fluorocarbon leader, two snelled 6/0–10/0 hooks. The double snell rig allows the bait to sit naturally. Keep hook points exposed — hiding them causes missed strikes."},
      {name:"Paternoster Rig",detail:"Two dropper paternoster, 6/0–10/0 circle hooks on 60–80lb fluorocarbon droppers. Star or pyramid sinker to hold in current. Use for rough surf or strong current where a running sinker would drag."},
      {name:"Live Bait Rig",detail:"Single 6/0–8/0 hook pinned through the lower jaw and out through the top of the nose of a live mullet or herring, running sinker just heavy enough to hold position, no wire trace. Live baits are the most consistent producers of large mulloway."},
    ],
    tackle:"12–14ft heavy surf rod (rated to 10–15kg), 6000–10000 baitrunner reel or Alvey surf reel, 30–50lb monofilament or 50–80lb braid mainline. Baitrunner reels allow a mulloway to take line without feeling resistance before striking.",
    techniques:[
      {name:"Night fishing the tide change",detail:"Mulloway feed most actively in the two hours either side of a tide change — especially the run-out. Set up before dark, cast baits into the deepest gutter you've found, and fish through the night. Patience is everything — one bite in five hours is a typical session."},
      {name:"Fresh is everything",detail:"Mulloway are unforgiving about bait quality. Live bait dramatically outperforms dead; fresh dead dramatically outperforms frozen. Have a live bait tank if possible. Source fresh mullet by throwing a cast net — it makes a massive difference."},
      {name:"Mobility and persistence",detail:"Mulloway follow defined routes. If you haven't had a bite after two hours, move 500m along the beach and try a different gutter. They will travel the route at some point — being in the right gutter at the right time is the key."},
    ],
    tips:["Never leave a mulloway session — they notoriously bite at the moment you pack up or switch off the torch","Keep bait 100% fresh — buy quality squid, not frozen bricks, and keep it on ice","Use a large baitrunner reel set with free spool — let the fish run with the bait before striking","Avoid heavy torch use over your lines — mulloway are extremely wary and will drop the bait if they feel resistance","Bleed and ice immediately — mulloway flesh is delicate and deteriorates quickly"],
    legal:"NSW: 70cm minimum, bag limit 2. QLD: 75cm. SA: 55cm. WA: 50cm. These are minimum sizes — larger fish are often breeding stock, so consider releasing trophy fish.",
    eating:"Superb table fish — sweet, firm white flesh with large boneless fillets. Best pan-fried, baked whole or BBQ. Should be bled and iced immediately. Freezes well.",
  },
  salmon: {
    label:"Australian Salmon", icon:"🐟", aka:"Bay trout, salmon trout, eastern/western salmon",
    description:"Australian salmon (Arripis trutta east coast, A. truttaceus WA) are a tough, hard-fighting surf species with a cult following — particularly in WA and SA where massive schools crash the beaches in winter. They are aggressive, powerful fish that hit hard and run far. Not related to Atlantic salmon, they are a uniquely Australian species.",
    seasons:"WA: autumn–winter (March–August) for legendary beach runs. SA: year-round with winter peaks. NSW/VIC: autumn and winter. Eastern salmon run north to south in autumn, south to north in spring.",
    habitat:"Exposed surf beaches with heavy swell, rocky headlands, breakwalls. They are a rough-water species and actively feed in large surf — conditions that deter other anglers are perfect for salmon.",
    findingFish:"Look for beaches exposed to south-westerly swell in WA/SA. Salmon patrol the wash zone — the area of churned white water where waves break. Rocky headlands with current sweep are also productive. In heavy swell, stand higher on the beach and look for dark shapes or surface commotion just behind the breakers.",
    baits:["Metal slug (chrome, 30–85g — the top technique)","Pilchard (whole, ganged hooks)","Garfish","Soft plastic (large, 5–7\")","Poppers and surface lures","Flesh bait (mullet or herring strip)"],
    rigs:[
      {name:"Metal Lure Rig",detail:"30–85g chrome slug on 25–40lb leader, snapped directly to a cross-lock clip. Cast into the white wash and retrieve fast. Chrome or silver coloured slugs outperform bright colours in clear water. Vary the retrieve speed and add pauses."},
      {name:"Bait Rig",detail:"Running sinker on 15–20lb mainline, 40–60cm of 20–30lb fluorocarbon leader to a 3/0–5/0 hook. Whole pilchard or garfish on ganged 2/0 hooks retrieved slowly through the wash."},
    ],
    tackle:"10–12ft surf rod rated 4–8kg, 5000–8000 spinning reel, 15–20lb monofilament. For lure fishing, braided line 15–20lb with 30lb fluorocarbon leader gives better casting distance with metal slugs.",
    techniques:[
      {name:"Metal slug fishing",detail:"Cast as far as possible into rough water and retrieve fast — salmon hit on the retrieve. Vary speed: fast continuous, fast with pauses, or a steady aggressive pace. The commotion of rough water draws fish in, so don't avoid the biggest waves."},
      {name:"Reading the school",detail:"Salmon travel in large schools visible as dark shadows in the water, surface splashing, or birds diving. Once you locate a school, cast beyond them and retrieve back through the school. They are not leader-shy and hit aggressively."},
    ],
    tips:["Rough south-westerly swell in WA brings the best salmon runs — embrace bad weather conditions","Metal slugs in 40–60g are the most versatile lure size for beach work","Fast retrieves almost always outperform slow for salmon","Salmon are oily and strong-flavoured — bleed immediately and eat very fresh or smoke them","They are powerful runners — keep the drag firm and the rod bent"],
    legal:"NSW: 30cm. WA: 30cm. SA: 30cm. Bag limits generally 10 per person. Check current state regulations.",
    eating:"Strong, oily flesh — not to everyone's taste fresh but outstanding when smoked or salt-cured. Must be bled immediately and handled carefully. Eat the same day if consuming fresh.",
  },
  kingfish: {
    label:"Kingfish", icon:"🦈", aka:"Yellowtail kingfish, kingie, Samson fish (WA)",
    description:"Yellowtail kingfish (Seriola lalandi) are Australia's premier inshore sportfish — a powerful, fast, aggressive predator that has built an obsessive following among lure and live-bait specialists. They strip line from reels at extraordinary speed and will test both angler and tackle to the limit. Found around headlands, offshore reefs and inshore kelp beds.",
    seasons:"Year-round in QLD, summer–autumn peak in NSW/VIC (November–April). WA: Samson fish (closely related) peak autumn–winter. Large fish (20kg+) peak in warmer months following bait migrations.",
    habitat:"Rocky headlands with current sweep, offshore and inshore reefs, kelp beds, FADs (fish aggregating devices), and anywhere with concentrations of baitfish. They follow baitfish schools relentlessly.",
    findingFish:"Look for current lines and eddies around headlands — kingie patrol these edges hunting baitfish. Watch for birds, surface commotion or baitfish 'boiling' at the surface. Dawn and dusk are the key feeding windows at headlands. Offshore, reef pinnacles and FADs hold fish year-round.",
    baits:["Live yellowtail (yakka) — #1 live bait","Live slimy mackerel","Live squid","Metal jig (30–200g)","Stick bait / popper (surface)","Large soft plastic (4–8\" swimbait)"],
    rigs:[
      {name:"Live Bait Rig",detail:"Single 5/0–7/0 hook (inline or circle) pinned through the nose of a live yakka or mackerel. 60–80lb fluorocarbon leader 2–3m. No swivel — tie direct. Running sinker optional (1/4–1/2oz bullet sinker) to keep bait at depth."},
      {name:"Jigging Rig",detail:"30–200g knife jig on 60–100lb fluorocarbon leader 1.5–2m joined to 50lb braid mainline. Assist hooks (single or double) on the jig top. Rip the jig up fast on the fall — kingie hit hard on the retrieve."},
      {name:"Popper/Stickbait Rig",detail:"Large surface lure (popper or stickbait, 100–200mm) on 60–100lb leader, 50lb braid. Cast to the edge of the reef or current line and work aggressively — big pops or walking the dog retrieve."},
    ],
    tackle:"Heavy spin or overhead outfit: 30–50lb braid, 60–100lb fluorocarbon leader 2–3m. For jigs: 20–30kg overhead rod 6–6.5ft, lever drag reel, PE3–5 braid. For live bait and headland casting: 8–10ft spin rod, 5000–8000 reel.",
    techniques:[
      {name:"Ripping jigs",detail:"Drop the jig to the bottom, then rip up fast with 3–5 quick cranks and drops. Kingfish hit jigs on the fast upward sweep. Speed is critical — slow jigs rarely catch kings. Vary the rhythm: 3 fast sweeps, pause, 3 fast sweeps."},
      {name:"Live baiting",detail:"Present the live yakka near structure or in the current line at first light. Allow it to swim freely with just enough sinker to keep it down. A live bait swimming erratically in distress is irresistible to a hunting kingfish."},
      {name:"Dawn headland sessions",detail:"Be on the headland before sunrise. Cast metal jigs or stick baits along current edges. The first 90 minutes of light is typically the most productive window. After that, fish tend to drop deep."},
    ],
    tips:["Speed is everything for jigs — if your arms aren't burning you're not retrieving fast enough","Kingie have excellent eyesight — in clear water use long, quality fluorocarbon leaders","They run hard for structure immediately on being hooked — keep maximum pressure and change their direction instantly","Live yakkas (yellowtail scad) are the single most effective bait — jig them up near FADs or reef in the morning","Use stout, quality hooks — kingfish quickly straighten cheap hooks"],
    legal:"NSW: 65cm. QLD: 60cm. WA (Samson fish): 60cm. Bag limits typically 5 per person. Kingfish in many areas are under pressure — consider releasing larger fish.",
    eating:"Outstanding eating — firm, rich, white flesh. Excellent sashimi, BBQ, roasted or pan-fried. Best eaten fresh, same day. Large fish (over 10kg) can have strong flavour — ice immediately.",
  },
  jewfish: {
    label:"Jewfish (Black)", icon:"🐠", aka:"Black jewfish, northern mulloway, black jew",
    description:"Black jewfish (Protonibea diacanthus) are the tropical northern cousin of the mulloway — a massive, powerful predator found across northern Australia from WA to QLD. They are one of the most prized catches in tropical waters, capable of exceeding 1m and 20kg. Like their southern relative, they have a reputation for being elusive and challenging.",
    seasons:"Year-round in northern waters (NT, tropical QLD, WA). Prime season is the dry season (April–October) when rivers clear and fish concentrate in estuaries, around jetties and near rocky headlands.",
    habitat:"Estuarine systems, deep river holes, jetties and bridges, coastal reefs and rocky headlands in tropical waters. In the NT and tropical QLD, they lurk around mangrove systems and deep holes in tidal rivers.",
    findingFish:"Deep holes in river systems — especially bends where current scoops out the bottom. Jetty pylons and bridge supports are classic holding areas. Rocky headlands with depth and current in the tropics. Fish the two hours either side of the tide change for best results.",
    baits:["Live mullet (best bait)","Fresh squid","Live herring / sard","Whole fresh pilchard","Large soft plastic (paddle tail or curl tail, 6–8\")","Live bait fish of any kind"],
    rigs:[
      {name:"Running Sinker Rig",detail:"Ball or star sinker on 30–50lb mainline, three-way swivel, 80cm of 60–80lb fluorocarbon or heavy mono leader, single 7/0–10/0 circle hook. Circle hooks are excellent for jewfish — they hook in the corner of the mouth reliably."},
      {name:"Soft Plastic Rig",detail:"1/2–1oz jighead, size 5/0–7/0 hook, 5–8\" paddle tail or curl tail plastic. Work slowly along the bottom near structure. Natural colours (white, pearl, olive) or dark colours at night."},
    ],
    tackle:"Medium-heavy spin or baitcast outfit: 15–30kg rod, 6000–10000 reel, 30–50lb braid mainline, 60–80lb fluorocarbon leader. Jewfish run hard in structure — you need stopping power.",
    techniques:[
      {name:"Tide change",detail:"The single most important factor. Fish the hour before and after each tide change, especially the outgoing tide. Jewfish become active as the current shifts and baitfish are swept into vulnerable positions."},
      {name:"Structure fishing",detail:"Drop baits or plastics right next to structure — jetty pylons, bridge pillars, rock walls. Jewfish hold tight to structure and ambush passing prey. Presentations away from structure often go unnoticed."},
      {name:"Night fishing",detail:"Black jewfish feed heavily at night — a live mullet or fresh squid soaked near structure after dark is the most reliable method. Set up at dusk and fish through the first few hours of darkness."},
    ],
    tips:["Jewfish are found much further north than mulloway — they inhabit tropical Australia where mulloway don't","Night fishing with live bait near structure is the most consistently productive approach","They hit hard and immediately head for pylons or rock — keep maximum pressure from the strike","In the NT, be croc-aware when night fishing near water — never fish alone in northern systems","Catch limits in QLD and NT vary — check current regulations for tropical jewfish"],
    legal:"QLD (black jewfish): 60cm minimum, 5 per day. NT: check local regulations. WA: check local regs for the relevant region.",
    eating:"Excellent eating — firm white flesh, similar to mulloway. Best pan-fried, baked or BBQ. Bleed immediately on capture.",
  },
  luderick: {
    label:"Luderick", icon:"🐟", aka:"Blackfish, black bream, darkie",
    description:"Luderick (Girella tricuspidata) are one of Australia's most unique sport fish — a vegetarian species that feeds exclusively on weed and algae. They require a completely different approach to other species: specialised float rigs, weed bait, and a highly technical presentation style that has developed a dedicated cult following, especially in NSW and QLD.",
    seasons:"Year-round but peak autumn–winter (April–August) in NSW/QLD. Winter brings large schools onto rock platforms and breakwalls where green weed grows most prolifically.",
    habitat:"Weed-covered rock platforms and headlands, breakwalls, estuary rock edges, and any structure with green or cabbage weed growing on it. They feed in the wash zone around the base of rocks.",
    findingFish:"Find weed-covered rock platforms exposed to a gentle to moderate swell. Platforms with green weed growing right in the wash zone are best. Watch the water washing over the rocks — where weed is growing, luderick will be feeding. Breakwalls with weed growth at the waterline are excellent.",
    baits:["Green weed (ribbon-like, from rocks at the fishing spot)","Cabbage weed (flat, wider leaf)","Cunjevoi (sea squirt — found on rocks)","Estuary weed (estuaries only)"],
    rigs:[
      {name:"Bream/Luderick Float Rig",detail:"1–1.5m of 4–6lb fluorocarbon leader to a size 8–12 hook (long shank preferred). Split shot sinker 20–30cm above the hook to keep bait in the zone. Set a quill or pencil float so the bait fishes 30–60cm below the surface. Match the float to the swell — heavier float in bigger swell."},
    ],
    tackle:"9–11ft light spinning or dedicated luderick rod with a sensitive tip. 2000–2500 reel, 4–8lb monofilament mainline, 4–6lb fluorocarbon leader. The lighter the terminal tackle, the more bites you'll get.",
    techniques:[
      {name:"Float fishing",detail:"Set the float so the weed bait sits 30–60cm below the surface. Allow the float to drift naturally with the current and wash over the rocks. Watch the float intently — a bite is often just a subtle slowing or sideways movement before it disappears."},
      {name:"Matching the weed",detail:"Always collect your weed from the rocks AT the fishing spot — match exactly what the fish are eating. A small bunch (3–5 strands of green weed) threaded onto the hook so it hangs naturally is the standard presentation. Never use too much weed."},
      {name:"Reading the wash",detail:"Let the float and bait wash in naturally with each wave, then drift back out with the backwash. Luderick follow this natural movement — an unnatural presentation catches nothing. Observe the water movement for several minutes before starting."},
    ],
    tips:["Collect weed from the exact rocks where you're fishing — matching the local weed is critical","Light line is essential — 6lb leader in clear water is maximum","Luderick are slow, methodical biters — don't strike at every movement of the float, wait for it to fully dip","Berleying with bread, lettuce or the collected weed itself can dramatically improve bite rates","A dedicated luderick rod with a soft, sensitive tip makes float watching much easier"],
    legal:"NSW: 27cm. QLD: 25cm. Bag limits typically 20 per person.",
    eating:"Excellent, underrated eating — clean, white, firm flesh. Must be bled and gutted immediately as the gut cavity contains weed which can taint the flesh. Best pan-fried, battered or baked.",
  },

  barramundi: {
    label:"Barramundi", icon:"🐊", aka:"Barra, giant perch, Asian sea bass",
    description:"Barramundi (Lates calcarifer) is Australia's most iconic sportfish — a powerful, acrobatic predator found across tropical and sub-tropical northern Australia from Shark Bay in WA around to Brisbane. Famous for their explosive jumps and headshakes when hooked, they are equally revered for their exceptional eating quality. Barra are protandrous hermaphrodites — all fish start as males and switch to female after several seasons.",
    seasons:"Tropical north: year-round with the wet season (Oct–April) producing peak activity. Dry season fish tend to concentrate around structure. Southern range (Brisbane, Exmouth): best Oct–March as water warms. A 3-month closed season applies in QLD (Nov–Jan).",
    habitat:"Estuaries, tidal rivers, mangrove creeks, coastal beaches near river mouths, rock bars, and any structure with current flow. They are ambush predators — always look for snags, submerged timber, rock bars and mangrove edges.",
    findingFish:"Structure is everything for barramundi. Low-tide reconnaissance reveals what's hidden underwater — walk the flats at low tide to identify rock bars, gutters and snags before fishing the run-in. Fish are almost always close to cover. Tidal movement is critical — barra activate as the current strengthens, flushing baitfish out of mangroves. The tide change window (2 hours either side) is the most reliable feeding period.",
    baits:["Live mullet (best live bait)","Live prawns (winter favourite)","Live herring / greenback","Live garfish","Soft plastic (paddle tail/shrimp)","Hard body minnow lure","Surface popper","Weedless frog lure"],
    rigs:[
      {name:"Running Sinker (live bait)",detail:"Single 3/0–6/0 circle or octopus hook, 40lb fluorocarbon leader 50–80cm. Only enough weight to hold position in current. Baitcaster rod 6'–6'6\", 8–12kg rating, 200–250 size reel with 20lb braid + 50lb fluoro leader."},
      {name:"Paternoster (bait soaking)",detail:"Two-hook paternoster with 4/0–6/0 circle hooks on 40–60lb fluorocarbon droppers. Star sinker to hold in current. Rod in holder — let the Kahle hook do the work, don't strike."},
      {name:"Lure Setup",detail:"6'6\"–7' medium-heavy spin or baitcaster rod, 4000–5000 reel, 20lb braid, 50–70lb fluorocarbon leader 1–1.5m. Hard body minnow, soft plastic vibe or surface popper. Cast tight to structure; vary retrieve speed. Exposed hooks outperform weedless for barra."},
    ],
    tackle:"Baitcaster preferred for accuracy around snags: 6'–6'6\" rod, 4–8kg rating, 200–250 baitcaster reel, 20lb braid + 50lb fluoro. Spinning: 6'6\"–7', same power rating. Always use abrasion-resistant leader — barra's gill plates and structure will cut lighter material.",
    techniques:[
      {name:"Cast and twitch to structure",detail:"Cast hard body lures or soft plastics UP-current of a snag or rock bar and let them drift past. Small twitches and pauses as the lure floats past the fish's face. One cast isn't enough — persist and work the spot. If a fish doesn't take, try different lure colours, sizes and speeds."},
      {name:"Tide-change bait soaking",detail:"Set a live mullet or prawn on a paternoster rig near a creek mouth or rock bar at the tide change. Rod in holder, free spool on the baitrunner, bait on the bottom. Barra hook themselves — a circle hook set in the corner of the mouth is the result."},
      {name:"Night surface poppers",detail:"As the sun sets, barramundi move to the surface to feed on mullet. Work surface poppers slowly past mangrove edges with long pauses. The explosive surface strikes at night are unforgettable."},
    ],
    tips:["Always fish moving water — barra are lazy ambush predators that rely on current to push bait past them","Low tide reconnaissance is time well spent — photograph or map the structure before the water rises","Keep rod tip low when fighting a hooked barra — it reduces the chance of the fish throwing the hook on a jump","Barra have extremely hard mouths — use sticky-sharp hooks and check them regularly","Released barra should be held horizontally in the water until fully recovered — vertical holding damages their swim bladder"],
    legal:"QLD: 58–120cm, bag limit 5 per person. NT: 55cm minimum. WA: 55cm. Check current closed season and slot limits in your state.",
    eating:"Outstanding — widely regarded as Australia's best eating fish. Firm, white, mild flesh. Suits pan-frying, baking, BBQing and beer battering. Saltwater barra significantly outperforms impoundment fish in flavour.",
  },

  mangrove_jack: {
    label:"Mangrove Jack", icon:"🔴", aka:"Jack, creek red bream, dog bream, red perch",
    description:"Mangrove jack (Lutjanus argentimaculatus) are one of Australia's most aggressive and hard-fighting inshore sportfish — pound for pound, arguably the toughest fish in tropical Australian waters. Their instinctive rush back to structure the instant they're hooked makes them particularly challenging, and their explosive strikes and deep-red colouring have earned a devoted following from tropical anglers.",
    seasons:"Year-round in tropical QLD, NT and WA. Most active Oct–April (wet season). Juveniles inhabit shallow mangrove creeks; large adults (3kg+) move to deeper offshore reefs as they mature but return inshore seasonally.",
    habitat:"Mangrove creeks, tidal river bends, rock bars, bridge pylons, jetties and deep reef structure. They hold tight to the most impenetrable snags they can find. Structure that is impossible to fish is exactly where the biggest jacks live.",
    findingFish:"Locate the worst snags in the system — overhanging mangroves, submerged timber piles, undercut rock bars. Large jacks occupy the most protected positions and won't move far to take a bait or lure. You must place your presentation directly in their face. Fish the tide changes, especially the first run-out after high water when baitfish are flushed from the mangroves.",
    baits:["Live mullet (best)","Live herring / sard","Live prawn","Strip bait (mullet or herring)","Soft plastic (paddle tail 3–5\")","Hard body diving lure","Blade lure"],
    rigs:[
      {name:"Running Sinker (live bait)",detail:"3/0–5/0 circle hook, 40–60lb fluorocarbon leader 50cm. Lightly weighted — enough to keep bait down. Spinning or baitcaster outfit, 15–20lb braid, 40–60lb fluoro leader."},
      {name:"Lure Rig",detail:"Baitcaster or heavy spin: 15–20lb braid, 40–60lb fluorocarbon leader 50–80cm. 3–5\" paddle tail on 1/4–1/2oz jighead or diving minnow lure. Short, stout rod 6'–6'6\" to have pulling power when fish heads for snags."},
    ],
    tackle:"Heavy for the size of the fish: 6'–6'6\" medium-heavy rod, 3000–4000 spin or baitcaster reel, 20lb braid, 40–60lb fluorocarbon leader. You need stopping power — jacks go straight back to the snag. Lures in 2–4\" range. Bright colours in dirty water; natural in clear.",
    techniques:[
      {name:"Tight casts to structure",detail:"Cast lures or live baits as close to snags and overhanging mangroves as possible. Jacks won't chase bait far from cover. Accuracy matters more than distance. Cast past the snag and retrieve through it."},
      {name:"Locking down on the strike",detail:"When a jack strikes, immediately clamp down on the drag and turn the fish hard. Give it even a second to run and it will brick you in the snag. The fight is won or lost in the first three seconds."},
      {name:"Night fishing",detail:"Large jacks feed aggressively after dark, moving away from structure to patrol. Night sessions around bridge lights or jetty pylons with live baits are consistently the most productive for big fish."},
    ],
    tips:["Lock the drag tight and be ready to pull hard immediately on the strike — there's no time to be gentle","Cast as close to the worst snags as you can — that's exactly where the biggest fish are","Jacks have sharp gill plates that can cut fluorocarbon — check and replace leaders regularly","In dirty water after rain, jacks become very active and less cautious — a prime window","Smaller fish (under 35cm) should be released to grow — large jacks are exceptional breeding fish"],
    legal:"QLD: 35cm minimum, bag limit 5. NT: 38cm. WA: 35cm. Bag limits vary — check current state regulations.",
    eating:"Excellent — firm, white, sweet flesh. Best pan-fried, baked or grilled. Salt water fish are superior to freshwater specimens in eating quality.",
  },

  trevally: {
    label:"Trevally (Giant/Silver)", icon:"⚡", aka:"GT, giant trevally, silver trevally, GTs",
    description:"Trevally encompasses two distinct species that are popular beach targets. Giant trevally (Caranx ignobilis) are the powerful tropical and sub-tropical species that can exceed 60kg, delivering blistering runs. Silver trevally (Pseudocaranx georgianus) are the more widespread southern species found from WA to QLD, a superb light-tackle and table species. Both are schooling fish that hunt beaches, headlands and gutters aggressively.",
    seasons:"Giant trevally: tropical QLD, NT, WA — year-round, peak Oct–March. Silver trevally: year-round NSW/VIC/SA/WA, peak autumn and winter. Both species are most active around tidal movement.",
    habitat:"GTs: rocky headlands, beach gutters, reef edges, surf zones. Silver trevally: sandy beaches and gutters, estuaries, jetties, reefs. Both species hunt in the wash zone and current lines around structure.",
    findingFish:"For GTs: look for headlands with current sweep and deep water close to shore. Baitfish schools on the surface with birds diving indicate active GT schools below. For silver trevally: any beach gutter with moving water, particularly around the tide change. Jetties are reliable year-round spots for silver trevally.",
    baits:["Whole pilchard (ganged)","Live herring / yakka","Metal slug (GTs)","Popper / stickbait (GTs)","Soft plastic paddle tail","Prawn (silver trevally)","Beach worm (silver trevally)"],
    rigs:[
      {name:"Running Sinker (silver trevally)",detail:"Running ball sinker on 8–12lb mainline, 30–50cm of 10–15lb fluorocarbon leader, size 2–1/0 hook. Light as possible — silver trevally are line-shy in clear water."},
      {name:"GT Popper/Stickbait Rig",detail:"Heavy spin or overhead: 50lb braid, 80–100lb fluorocarbon leader 1.5–2m. Large popper (100–180mm) or stickbait worked aggressively on the surface over reef or headland structure."},
      {name:"Metal Slug (both species)",detail:"20–80g chrome slug, 30–60lb leader, cross-lock clip. Fast retrieve with pauses. GTs hit explosively on the pause; silver trevally hit on the steady retrieve."},
    ],
    tackle:"Silver trevally: light-medium spin outfit, 2500–4000 reel, 8–12lb mainline. Giant trevally: heavy PE3–5 braid, 100lb leader, quality hooks that won't straighten. GTs will destroy cheap tackle.",
    techniques:[
      {name:"Popper fishing for GTs",detail:"Cast poppers into current lines and retrieve aggressively with loud, splashy pops. GTs are attracted to commotion and will race from depth to smash a surface lure. Dawn and dusk are the most reliable windows. Change up cadence — some days they prefer fast, some days slower."},
      {name:"Metal slugs in the wash",detail:"Cast metal slugs into white water and retrieve at varying speeds. Both species hit slugs readily. For silver trevally, a steady medium-fast retrieve works best. For GTs, add a sharp twitch-pause-twitch rhythm."},
    ],
    tips:["GTs are incredibly powerful — use quality gear rated for the fight or you'll be cleaned up","Silver trevally are excellent eating and underrated as a table fish — worth targeting specifically","Both species are most active during tidal movement — slack water produces little","GTs are highly catch-and-release oriented in many areas — handle with care and release quickly","School trevally (another related species) are commonly caught in deeper gutters on small metal slugs"],
    legal:"Giant trevally: QLD 50cm, WA 50cm. Silver trevally: NSW 25cm, VIC 25cm, SA 20cm. Bag limits vary by state.",
    eating:"Silver trevally: excellent — firm, sweet white flesh, one of the best eating fish from the surf. GTs: good eating when fresh, particularly smaller fish (under 5kg). Bleed immediately.",
  },

  dart: {
    label:"Dart", icon:"🏹", aka:"Swallowtail dart, common dart, tropical dart",
    description:"Dart (Trachinotus blochii and T. anak) are one of the most underrated surf fishing species in Australia — torpedo-shaped, acrobatic fighters that hit hard and run fast on light tackle. Found along tropical and subtropical beaches from QLD around to WA, they school in the surf zone and are a delight to target on light gear. Their forked tail and silver flanks make them instantly recognisable when they leap.",
    seasons:"Year-round in tropical QLD, NT, WA. Best through the warmer months (Oct–April) when they school in the surf. Winter in southern QLD can produce excellent dart fishing as they move north.",
    habitat:"Surf beaches with good wave action, gutters and intertidal zones. Dart love the white wash — they forage along the wave face and through shallow gutters, often very close to the shore break. Sandy beaches with well-defined gutters are ideal.",
    findingFish:"Look for a well-defined gutter with some wave action — dart feed right in the white water zone and are often visible as silver flashes in the wave face. You rarely need to cast far — 20–30m is usually enough. Multiple dart in the same gutter means a school is present; work it hard while they're feeding.",
    baits:["Pipi / cockle (best bait)","Beach worm","Sandworm","Prawn (peeled)","Small flesh strip","Metal slug (small 10–20g)","Small soft plastic"],
    rigs:[
      {name:"Running Sinker Rig",detail:"Very light running sinker on 6–8lb mainline, swivel, 20–30cm of 6–8lb fluorocarbon leader, size 4–1/0 hook. Use minimum weight. Dart bites are fast and sharp — they don't mouth the bait, they hit and run."},
    ],
    tackle:"Light spin outfit: 7–9ft rod, 2500–3000 reel, 6–8lb monofilament or light braid. Very light terminal tackle required — heavy gear noticeably reduces bites. Dart are fast strikers and can be caught on very small hooks.",
    techniques:[
      {name:"Fishing the gutter edge",detail:"Cast to the landward edge of the gutter where shallow water drops into the deeper channel. Dart patrol this edge continuously. Use minimum weight and keep bait moving slowly — drag it 1m every 30 seconds."},
      {name:"Light lure fishing",detail:"Small metal slugs (10–20g) and small soft plastics worked through the white water produce exciting strikes. Fast retrieve with erratic twitches imitates fleeing baitfish."},
    ],
    tips:["Pipi is by far the best bait for dart — collect them fresh from the sand at low tide","Keep your bait light and moving — dart are fast, aggressive strikers that rarely play with the bait","Multiple rods covering different parts of the gutter will help locate where the school is feeding","Dart school tightly — once you locate them, you can catch many fish quickly","They are fantastic fun on ultra-light gear (4lb line) — give them a chance to show their true speed and power"],
    legal:"QLD: no minimum size listed. Generally no bag limit. Check current local regulations.",
    eating:"Surprisingly good eating — sweet, white firm flesh. Best eaten fresh, pan-fried or crumbed. An underrated table fish.",
  },

  queenfish: {

    description:"Queenfish (Scomberoides commersonnianus) are a spectacular surface-feeding tropical sportfish found across northern Australia — fast, acrobatic and explosive on light tackle. Known for their vertical leaps and head-shaking aerial displays when hooked, they are one of the most exciting light-tackle species in Australian coastal waters. Long, slender silver body with distinctive spotted flank markings.",
    seasons:"Year-round in the NT, tropical WA and tropical QLD. Most active Oct–April (build-up and wet season). They school aggressively in tropical summer and can be seen smashing baitfish on the surface.",
    habitat:"Sandy beaches, river mouths, estuaries, reef edges and open coastal waters. Queenfish are a surface and mid-water species that actively chase baitfish schools — find the bait and you'll find the queenfish.",
    findingFish:"Look for surface commotion — queenfish drive baitfish schools to the surface and attack from below, creating visible splashing often accompanied by diving terns and frigate birds. Beaches near river mouths and creek outflows are productive, particularly around the tide change.",

    rigs:[

    tackle:"Light-medium spin: 7–9ft, 3000–5000 reel, 10–20lb braid, 20–40lb fluorocarbon leader. Queenfish don't require heavy gear — the fight is all speed and acrobatics, not raw power.",
    techniques:[
      {name:"Surface lure school busting",detail:"When you find a surface school, cast metal slugs or soft plastics beyond the edge of the disturbance and retrieve fast through the school. Multiple hookups are common. Keep casting quickly between bites — the school can move fast."},
      {name:"Estuary and beach edges",detail:"Cast lures along the tide line and current edges near river mouths. Queenfish patrol these edges for flushed baitfish. Fast, erratic retrieves with pauses produce the best action."},
    ],
    tips:["Queenfish jump spectacularly when hooked — don't reel on a jumping fish, keep slight bow in the line","They hunt visually and hit fast-moving lures — slow presentations rarely work","Chrome metal slugs in 20–40g are the most versatile lure for these fish","Great fun on light spinning gear — 8lb line and a 7ft rod is exhilarating","Handle gently and release quickly — their slender body means they tire rapidly"],

  spanish_mackerel: {
    label:"Spanish Mackerel", icon:"⚡", aka:"Spaniard, Narrowbarred mackerel, Scomberomorus commerson",
    description:"Spanish mackerel (Scomberomorus commerson) are the premier pelagic sportfish of tropical and subtropical Australian coastal waters — incredibly fast, razor-toothed, and capable of explosive runs that test any outfit. One of the fastest fish in the ocean, they can hit lures at speeds exceeding 50km/h, producing explosive strikes. A truly magnificent sports fish that can exceed 40kg.",
    seasons:"Year-round in tropical waters. QLD: April–November peak (cooler months bring fish closer inshore). NSW: late summer–autumn (Feb–May) as water cools. WA: July–November peak off the Kimberley and Pilbara coasts.",
    habitat:"Open beaches and headlands adjacent to deep water, reef edges, rocky points with current, and any area with large baitfish schools (yakkas, slimy mackerel, herring). They follow bait migrations.",
    findingFish:"Find the bait schools — Spanish mackerel will be close by. Diving birds and surface commotion are the giveaway signs. From land, fish exposed rocky headlands with deep water close in. They often follow current edges and work upwind along beaches. Dawn and dusk are the primary feeding windows.",
    baits:["Live yakka / slimy mackerel (best)","Whole garfish (ganged)","Whole pilchard (ganged)","Metal slug 60–120g","High-speed trolling lure","Soft plastic swimbait 5–7\""],
    rigs:[
      {name:"Wire Trace Rig",detail:"15–30cm of 27–49kg wire trace (single-strand or multi-strand) with a 4/0–7/0 hook. Essential — Spanish mackerel will bite through any monofilament or fluorocarbon instantly. Snap swivel at the mainline connection. Running sinker or unweighted depending on current."},
      {name:"Metal Slug Rig",detail:"60–120g chrome, gold or colour slug on short 27kg wire trace (15cm) with a snap clip to the lure. No long leader — mackerel bite through anything. Fast straight retrieve or erratic twitch."},
      {name:"Live Bait Rig",detail:"Live yakka or slimy on a single 4/0–5/0 hook through the nose, short 27kg wire trace 20cm. Free-swim with light running sinker or unweighted."},
    ],
    tackle:"8–10ft surf/spinning rod, 5000–8000 reel, 20–30lb braid, short wire trace 15–30cm. Wire is non-negotiable — these fish have scalpel-like teeth. Bring wire cutters and long-nose pliers.",
    techniques:[
      {name:"Fast metal slug retrieves",detail:"Cast as far as possible and retrieve at maximum speed. Spanish mackerel are attracted to speed — a lure that looks like it's trying to escape triggers a reaction strike. Don't slow down mid-retrieve."},
      {name:"Live baiting over bait schools",detail:"Pitch a live yakka or slimy into a school of baitfish being worked by mackerel and let it swim freely. Takes are violent and immediate. Use a short wire trace at all times."},
      {name:"Headland dawn sessions",detail:"Be on the headland before sunrise. Cast metal slugs along the current edge and work fast. The first hour of light is critical for Spanish mackerel — they feed aggressively then retreat to deeper water."},
    ],
    tips:["Wire trace is 100% mandatory — mackerel teeth will bite through 200lb mono in a single pass","Spanish mackerel can match lure speeds above 10km/h — speed up your retrieve if not getting strikes","Always bring pliers and wire cutters — unhooking a fresh mackerel without pliers is dangerous","Small mackerel (under 70cm) are often better eating than large specimens","Bleed immediately — flesh deteriorates rapidly and must be kept on ice from the moment of capture"],
    legal:"QLD: 75cm minimum, bag limit 5. NSW: 60cm, bag limit 5. WA: 60cm. NT: 60cm. Check current state regulations.",
    eating:"Excellent when very fresh — rich, oily, firm flesh. Best grilled, BBQ'd or smoked. Must be iced and eaten within 24 hours — flesh degrades quickly after capture.",
  },

  gummy_shark: {
    label:"Gummy Shark", icon:"🦈", aka:"Gummy, flake, Australian smooth hound",
    description:"Gummy shark (Mustelus antarcticus) is the most popular shark species in southern Australia — a gentle, toothless (hence 'gummy') shark with crushing plate-like teeth for eating crustaceans. Superb eating, excellent sport on surf gear, and one of the most commercially important shark species in Australia. Found from southern QLD around the cool southern half of Australia to WA. The 'flake' in fish and chip shops is almost always gummy shark.",
    seasons:"Year-round in southern Australia. Peak season April–October when water cools. VIC and SA beaches produce the best gummy shark fishing. Sandy coastal beaches near reef and rocky areas are most productive.",
    habitat:"Sandy beaches adjacent to reef structure, shallow sandy bays, estuaries and river mouths in southern Australia. They hunt along the sand-reef interface for crabs, squid and baitfish on the bottom.",
    findingFish:"Fish sandy beaches with low-profile reef or rock mixed in — gummies patrol the sand-to-reef transition zone at night. Deep surf gutters adjacent to rock platforms are prime spots. Wade fishing at night with a headlamp is a classic VIC and SA technique. The two hours either side of a tide change are the most productive windows.",
    baits:["Squid (whole hood or strip — best bait)","Calamari tentacles","Pilchard (whole, fresh)","Silver trevally fillet","Cuttlefish","Octopus","Herring fillet"],
    rigs:[
      {name:"Running Sinker Rig",detail:"Ball or star sinker running on 20–30lb mainline, three-way swivel, 50–80cm of 30–50lb fluorocarbon or nylon monofilament leader, single 4/0–6/0 circle hook. No wire trace needed — gummies have crushing plates, not cutting teeth. Heavy enough sinker to hold position in swell."},
      {name:"Paternoster Rig",detail:"Two-hook paternoster with 4/0–6/0 circle hooks on 40–60lb fluorocarbon droppers, star sinker below. Two baits on the bottom gives better coverage in current."},
    ],
    tackle:"10–12ft surf rod, 5000–8000 reel, 20–30lb monofilament mainline. Baitrunner reels allow gummies to run with the bait before the hook sets. Use a long, sensitive rod tip to detect subtle takes.",
    techniques:[
      {name:"Night fishing the sand-reef edge",detail:"Cast to the transition zone between open sand and any reef or weed. Gummies patrol this edge searching for crabs and squid. Fish a baitrunner with free spool — they pick up the bait and move off before swallowing. Allow the fish to run 3–5 seconds before winding down and striking."},
      {name:"Fresh squid",detail:"Fresh squid dramatically outperforms old or frozen squid. A whole squid hood with the tentacles pushed inside is the classic gummy bait. Change baits every 20–30 minutes to maintain scent trail."},
    ],
    tips:["Freshness is critical — fresh squid over old squid will be the difference between zero and several fish","No wire trace needed — gummies crush rather than cut, and wire actually reduces bites","Fish a baitrunner with the spool free — gummies run with bait before swallowing, striking too early loses fish","VIC and SA beaches are the heartland — Ninety Mile Beach, Phillip Island and Yorke Peninsula are legendary spots","Bleed and ice immediately — shark flesh deteriorates rapidly if not handled correctly"],
    legal:"VIC: 45cm. SA: 45cm. NSW: 45cm. WA: no minimum size. Bag limits typically 2–5 per person. Check current state regulations.",
    eating:"Outstanding — the best eating of any Australian shark. Firm, white, boneless fillets with mild flavour. The 'flake' in fish and chips nationwide. Best battered, pan-fried or grilled.",

  tarwhine: {

    description:"Tarwhine (Rhabdosargus sarba) are a widespread and popular surf beach species found across southern and eastern Australia — a compact, hard-fighting member of the bream family with a distinctive yellow-gold sheen. Excellent sport on light gear and a very reliable target species from sandy surf beaches and rock platforms. Often confused with bream but identifiable by their more rounded body and golden colouration.",
    seasons:"Year-round. Peak spring and summer in NSW/QLD. Year-round in WA with autumn–winter producing larger fish. They school in moderate numbers and can be caught in large numbers when on the bite.",

    findingFish:"Target gutters on surf beaches similar to bream and whiting — the sand-to-rock or sand-to-weed transition zone. In WA they are prolific around reef edges accessible from beaches. Fish close in — tarwhine are comfortable feeding right in the intertidal zone.",
    baits:["Beach worm","Pipi / cockle","Sandworm","Prawn (peeled small)","Soft plastic (small grub 2\")","Yabby"],
    rigs:[
      {name:"Running Sinker Rig",detail:"Light running sinker on 6–8lb mainline, 30–40cm of 6lb fluorocarbon leader, size 4–8 long-shank hook. Keep it light — tarwhine are relatively easy to catch on correct presentation."},
    ],
    tackle:"7–9ft light spin rod, 2500 reel, 6–8lb monofilament or braid. Very light terminal tackle. Similar setup to whiting fishing — if it works for whiting, it works for tarwhine.",
    techniques:[
      {name:"Surf gutter fishing",detail:"Same approach as for bream and whiting — fish the incoming tide over sandy gutters and rock edges. Cast into the gutter and slowly work the bait along the sand. Active biters that don't need much encouragement."},
    ],
    tips:["Reliable surf species that can save an otherwise slow session","Very similar in habitat and approach to bream — fish them together","Respond well to berley in calmer conditions","Light line significantly improves catch rates in clear water","Often overlooked in favour of more glamorous species but great fun on light tackle"],
    legal:"NSW: 25cm. WA: 25cm. QLD: 23cm. Similar bag limits to bream — typically 20 per person. Check current state regulations.",

  },

  garfish: {
    label:"Garfish", icon:"🎣", aka:"Sea garfish, gar, needlefish, halfbeak",
    description:"Sea garfish (Hyporhamphus australis) are a surface-schooling species beloved by anglers for their lively schooling nature and their role as the premier live bait for almost every inshore predator in Australia. They are delicate, fast swimmers that live in the top metre of the water column. Light tackle float fishing for garfish is a relaxing and highly enjoyable style of fishing in its own right, and gar make superb eating.",
    seasons:"Year-round. Peak spring and summer in sheltered bays and harbours. They school in sheltered waters and are most reliably found over weed beds in estuaries and sheltered coastal bays.",
    habitat:"Sheltered bays, estuaries, harbours and coastal lagoons. They live in the top metre of the water column over weed beds and are most concentrated in areas with surface structure — moorings, jetty pylons, weed lines.",
    findingFish:"Berleying is the key to locating garfish — drift a berley trail of wet bread, dough or fish pellets and watch the surface. Garfish will quickly appear and school up in the berley. Jetties and wharves with some shade over weed beds are reliable spots.",
    baits:["Dough ball (bread and water kneaded stiff)","Pasta (cooked, small pieces)","Small prawn","Wet bread","Fish pellets (berley and bait)"],
    rigs:[
      {name:"Float Rig",detail:"Quill or pencil float, 4–6lb fluorocarbon leader 40–50cm, size 10–14 long-shank hook. Set the float so the bait is 20–30cm below the surface. Very small hook and minimal weight — gar have small mouths."},
    ],
    tackle:"7–9ft ultra-light spin rod, 1000–2000 reel, 3–4lb monofilament. The lightest possible setup maximises enjoyment and bite rates. A fine-tipped rod that shows the float clearly is ideal.",
    techniques:[
      {name:"Float fishing with berley",detail:"Set up a consistent berley trail of wet bread or pellets drifting downwind. Fish the float rig in the berley trail at 20–30cm depth. Light touch — gar mouths are delicate, don't strike hard."},

    ],
    tips:["Berley is the difference between finding garfish and not — don't skip it","Very small hooks (size 12–14) are essential — gar have tiny mouths","Handle live garfish gently — they are delicate and die quickly in warm water","As live bait, gar are irresistible to tailor, snapper, mulloway and kingfish — clip the beak and fish on ganged hooks","Gar flesh is best smoked — the fine bones dissolve during the smoking process"],
    legal:"NSW: no minimum size. VIC: no minimum size. Generally no bag limit. Check current state regulations.",

  herring: {

let activeFishModal = null;
let fishModalReturnView = null;

function openFishModal(key) {
  fishModalReturnView = currentView; // remember where we came from
  activeFishModal = key;
  render();
}

function closeFishModal() {
  const returnTo = fishModalReturnView;
  activeFishModal = null;
  fishModalReturnView = null;
  if (returnTo && returnTo !== currentView) {
    setView(returnTo);
  } else {
    render();
  }
}

function closeFishModal() {
  activeFishModal = null;
  render();
}

function renderGuide(){
  let html=`<div class="fade-up" style="margin-bottom:28px"><div class="section-label">KNOWLEDGE BASE</div><div class="section-title">Australian Beach Fishing Guide</div><p class="section-sub">Tap any species to read the full catching guide</p></div>`;
  html+=`<h3 style="font-size:10px;letter-spacing:.14em;color:rgba(255,255,255,.28);margin-bottom:14px;text-transform:uppercase">Target Species — tap to read full guide</h3>`;
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:11px;margin-bottom:34px">`;
  Object.entries(SPECIES_GUIDE).forEach(([key,guide])=>{
    const svgIcon = SPECIES_SVGS[key] || `<svg viewBox="0 0 48 26" width="48" height="26"><ellipse cx="23" cy="13" rx="18" ry="8" fill="#5A8080"/><path d="M41 13L48 8v10Z" fill="#488070"/><circle cx="8" cy="11" r="2" fill="#0d1515"/></svg>`;
    html+=`<button onclick="openFishModal('${key}')" style="background:rgba(255,255,255,.035);border:.5px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;text-align:left;cursor:pointer;font-family:inherit;color:#E8EDF2;transition:all .2s;width:100%" onmouseenter="this.style.borderColor='rgba(0,212,170,.3)';this.style.background='rgba(0,212,170,.04)'" onmouseleave="this.style.borderColor='rgba(255,255,255,.08)';this.style.background='rgba(255,255,255,.035)'">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:8px 10px;flex-shrink:0">${svgIcon}</div>
          <div>
            <div style="font-weight:600;font-size:16px">${guide.label}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.3);font-style:italic">${guide.aka}</div>
          </div>
        </div>
        <span style="color:#00D4AA;font-size:18px;opacity:.6">→</span>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:.5px solid rgba(255,255,255,.06);font-size:11px;color:rgba(0,212,170,.5);letter-spacing:.05em">TAP TO READ FULL GUIDE →</div>
    </button>`;
  });
  html+=`</div>`;
  html+=`<h3 style="font-size:10px;letter-spacing:.14em;color:rgba(255,255,255,.28);margin-bottom:14px;text-transform:uppercase">Reading Conditions</h3>`;
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:11px">`;
  TIPS_DATA.forEach(t=>{
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:9px"><span style="font-size:18px">${t.icon}</span><div style="font-size:14px;font-weight:600">${t.cat}</div></div><p style="font-size:13px;color:rgba(255,255,255,.48);line-height:1.7">${t.tip}</p></div>`;
  });
  html+=`</div>`;
  return html;
}

  // Modal

  return html;

// ── SEND EMAIL VIA EMAILJS ──────────────────────────────────
async function sendAlertEmail(subject, bodyLines, beachName){
  if(!alertConfig.configured || !alertConfig.email) return false;
  try {
    if(typeof emailjs === 'undefined'){
      console.warn('EmailJS SDK not loaded');
      return false;
    }
    emailjs.init(alertConfig.publicKey);
    const body = bodyLines.join('\n\n');
    const result = await emailjs.send(alertConfig.serviceId, alertConfig.templateId, {
      to_email:   alertConfig.email,
      to_name:    alertConfig.email.split('@')[0],
      subject:    subject,
      message:    body,
      beach_name: beachName,
      site_url:   'https://gillman46.github.io/tidestrike/tidestrike.html',
    });
    return result.status === 200;
  } catch(e) {
    console.error('EmailJS error:', e);
    return false;
  }
}

// ── CHECK ALL ALERTS AGAINST CURRENT CONDITIONS ─────────────
async function checkAllAlerts(manual=false){
  if(!currentWeather || !currentLocation) {
    showAlertToast('Search a beach first to check alerts','warning');
    return;
  }
  if(alertCheckRunning) return;
  alertCheckRunning = true;
  const btn = document.getElementById('checkNowBtn');
  if(btn){ btn.textContent='Checking…'; btn.disabled=true; }

  let fired = 0;
  for(const al of savedAlerts){
    if(!al.active) continue;
    const triggered = evalAlert(al);
    if(triggered.length > 0){
      const beachName = currentLocation.n + ', ' + currentLocation.s;
      const subject = '🎣 TideStrike Alert — ' + (al.name||beachName);
      const bodyLines = [
        'TideStrike Fishing Alert',
        'Beach: ' + beachName,
        'Time: ' + new Date().toLocaleString('en-AU'),
        '─────────────────────────────',
        ...triggered,
        '─────────────────────────────',
        'View full conditions at:',
        'https://gillman46.github.io/tidestrike/tidestrike.html',
        '',
        '(This alert was sent from TideStrike fishing intelligence app)',
      ];
      const sent = await sendAlertEmail(subject, bodyLines, beachName);
      const logEntry = {
        time: new Date().toISOString(),
        beach: beachName,
        alertName: al.name||'Alert',
        triggers: triggered,
        sent,
        manual,
      };
      alertLog.push(logEntry);
      if(sent) fired++;
    }
  }
  saveAlertLog();
  alertCheckRunning = false;
  if(btn){ btn.textContent='Check Now'; btn.disabled=false; }
  const msg = fired>0 ? fired+' alert'+(fired>1?'s':'')+' sent!' : 'No alert conditions met right now';
  showAlertToast(msg, fired>0?'success':'info');
  render();
}

// ── EVALUATE A SINGLE ALERT ──────────────────────────────────
function evalAlert(al){
  if(!currentWeather || !currentLocation) return [];
  const triggers = [];

  // Fish rating
  if(al.fishKey && al.fishMinRating){
    const sc = scoreConditions(al.fishKey, currentWeather, currentMoon?.phase||null);
    if(sc.total >= al.fishMinRating){
      const fd = FISH[al.fishKey];
      triggers.push('🐟 ' + (fd?.label||al.fishKey) + ': ' + sc.label + ' conditions (' + sc.total + '/10)');
    }
  }

  // Wind
  if(al.windEnabled){
    const w = currentWeather.wind||0;
    const dir = currentWeather.windDir||'';
    let windMatch = false;
    if(al.windMax && w <= al.windMax) windMatch = true;
    if(al.windDirOnshore || al.windDirOffshore){
      const shore = windShore(dir, currentLocation);
      if(shore){
        if(al.windDirOnshore && shore.isOnshore) windMatch = true;
        if(al.windDirOffshore && !shore.isOnshore && !shore.isCross) windMatch = true;
      }
    }
    if(windMatch){
      const shore = windShore(dir, currentLocation);
      triggers.push('💨 Wind ' + w + 'km/h ' + dir + ' (' + beaufort(w).label + ')' + (shore?' — '+shore.label:''));
    }
  }

  // Weather / sky conditions
  if(al.weatherEnabled && al.weatherCodes?.length){
    const wc = currentWeather.wmoCode;
    // Group matching: 0-2=clear, 3=overcast, 45-48=fog, 51-67=drizzle/rain, 80-82=showers, 95+=storm
    const matches = al.weatherCodes.some(code => {
      if(code===0 && wc<=2) return true;       // Clear/sunny
      if(code===3 && wc===3) return true;       // Overcast
      if(code===10 && wc>=1&&wc<=2) return true; // Partly cloudy
      if(code===50 && wc>=50&&wc<=82) return true; // Rain/showers
      if(code===95 && wc>=95) return true;      // Storm
      return false;
    });
    if(matches) triggers.push('⛅ Weather: ' + currentWeather.condition + ' — matches your sky alert');
  }

  // Swell
  if(al.swellEnabled && al.swellMin!=null && al.swellMax!=null){
    const sw = currentWeather.swellH||0;
    if(sw >= al.swellMin && sw <= al.swellMax)
      triggers.push('🌊 Swell ' + sw + 'm — in your target range (' + al.swellMin + '–' + al.swellMax + 'm)');
  }

  // Barometric pressure
  if(al.pressureEnabled){
    const p = currentWeather.pressure||0;
    const trend = currentWeekForecast?.[0]?.pressureTrend||'stable';
    if(al.fallingPressure && (trend==='falling'||trend==='falling_fast'))
      triggers.push('📉 Pressure FALLING — ' + p + ' hPa — pre-frontal feeding surge');
    if(al.risingPressure && (trend==='rising'||trend==='rising_fast'))
      triggers.push('📈 Pressure RISING — ' + p + ' hPa — post-frontal settling');
    if(al.pressureBelow && p < al.pressureBelow)
      triggers.push('📉 Pressure below ' + al.pressureBelow + ' hPa (currently ' + p + ' hPa)');
    if(al.pressureAbove && p > al.pressureAbove)
      triggers.push('📈 Pressure above ' + al.pressureAbove + ' hPa (currently ' + p + ' hPa)');
  }

  // Tide phase
  if(al.tideEnabled && al.tidePhases?.length){
    const phase = currentWeather.tidePhase||'';
    if(al.tidePhases.includes(phase))
      triggers.push('🌊 Tide is ' + phase.charAt(0).toUpperCase()+phase.slice(1) + ' — matches your tide alert');
  }

  // Golden window
  if(al.goldenWindow){
    const todayFc = currentWeekForecast?.[0];
    if(todayFc?.sunrise || todayFc?.sunset){
      const now = new Date().getHours()*60 + new Date().getMinutes();
      const toM = t => t ? parseInt(t.split(':')[0])*60+parseInt(t.split(':')[1]) : null;
      const events = [
        {m:toM(todayFc.sunrise), label:'Dawn'},
        {m:toM(todayFc.sunset),  label:'Dusk'},
        {m:toM(currentMoon?.moonrise), label:'Moonrise'},
      ].filter(e=>e.m!=null && e.m>now && e.m-now<=120);
      if(events.length>0)
        triggers.push('✨ Golden Window: ' + events.map(e=>e.label+' at '+Math.floor(e.m/60).toString().padStart(2,'0')+':'+String(e.m%60).padStart(2,'0')).join(', '));
    }
  }

  return triggers;
}

function showAlertToast(msg, type='info'){
  const colors={success:'#00D4AA',warning:'#FACC15',info:'rgba(255,255,255,.7)',error:'#F87171'};

  if(existing) existing.remove();

  el.id = 'alertToast';

}
