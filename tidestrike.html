<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans','Helvetica Neue',sans-serif;background:#060A0E;color:#E8EDF2}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fishSwim{
  0%   {transform:rotate(0deg) translateY(0px);}
  20%  {transform:rotate(-10deg) translateY(-1.5px);}
  40%  {transform:rotate(7deg) translateY(1px);}
  60%  {transform:rotate(-5deg) translateY(-1px);}
  80%  {transform:rotate(3deg) translateY(0.5px);}
  100% {transform:rotate(0deg) translateY(0px);}
}
.fish-logo-svg{animation:fishSwim 2.4s ease-in-out infinite;transform-origin:40% 50%;display:block;}
.fish-logo-svg:hover{animation:fishSwim 0.45s ease-in-out infinite;}
.fade-up{animation:fadeUp .5s ease forwards}

/* layout */
nav{position:sticky;top:0;z-index:100;background:rgba(6,10,14,.94);backdrop-filter:blur(20px);border-bottom:.5px solid rgba(255,255,255,.07)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 20px;gap:12px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;transition:opacity .2s}
.logo:hover{opacity:.8}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.05em}
.nav-links{display:flex;gap:2px;overflow-x:auto}
.nav-btn{background:transparent;border:none;border-radius:8px;padding:6px 13px;color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.nav-btn.active{background:rgba(0,212,170,.1);color:#00D4AA;font-weight:500}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

main{max-width:1100px;margin:0 auto;padding:20px 14px calc(80px + env(safe-area-inset-bottom))}

/* cards */
.card{background:rgba(255,255,255,.035);border:.5px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;transition:border-color .2s}
.card:hover{border-color:rgba(255,255,255,.14)}
.card-teal{background:rgba(0,212,170,.04)!important;border-color:rgba(0,212,170,.18)!important}

/* inputs */
input,select{background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 15px;color:#E8EDF2;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:rgba(0,212,170,.5)}
input::placeholder{color:rgba(255,255,255,.25)}
select option{background:#111820;color:#E8EDF2}

/* buttons */
.btn{background:#00D4AA;border:none;border-radius:10px;padding:11px 22px;color:#060A0E;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border:.5px solid rgba(255,255,255,.15);border-radius:10px;padding:8px 16px;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-ghost:hover{border-color:rgba(255,255,255,.3);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}

/* tabs */
.tabs{display:flex;border-bottom:.5px solid rgba(255,255,255,.08);margin-bottom:22px}
.tab{background:transparent;border:none;border-bottom:1.5px solid transparent;padding:9px 16px;font-size:11px;cursor:pointer;color:rgba(255,255,255,.38);font-family:inherit;letter-spacing:.09em;font-weight:500;text-transform:uppercase;transition:all .2s}
.tab.active{color:#00D4AA;border-bottom-color:#00D4AA}

/* tags */
.tag{background:rgba(0,212,170,.09);border:.5px solid rgba(0,212,170,.22);border-radius:20px;padding:3px 10px;font-size:12px;color:#00D4AA;display:inline-block;margin:2px}
.badge{background:rgba(255,255,255,.07);border-radius:5px;padding:2px 7px;font-size:11px;color:rgba(255,255,255,.4)}

/* search dropdown */
.dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#111820;border:.5px solid rgba(255,255,255,.12);border-radius:12px;z-index:200;max-height:260px;overflow-y:auto}
.dropdown-item{padding:10px 15px;font-size:14px;cursor:pointer;color:rgba(255,255,255,.75)}
.dropdown-item:hover{background:rgba(0,212,170,.08);color:#E8EDF2}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.035);border:.5px solid rgba(255,255,255,.08);border-radius:14px;padding:16px}
.stat-label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.stat-value{font-size:21px;font-weight:500;letter-spacing:-.02em;margin-bottom:2px}
.stat-sub{font-size:12px;color:rgba(255,255,255,.28)}

/* dots rating */
.dots{display:flex;gap:3px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.13);display:inline-block}
.dot.on{background:#00D4AA}

/* spinner */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:3rem 0}
.spinner{width:36px;height:36px;border:2px solid rgba(0,212,170,.18);border-top:2px solid #00D4AA;border-radius:50%;animation:spin .75s linear infinite}
.spinner-label{color:rgba(255,255,255,.35);font-size:12px;letter-spacing:.12em}

/* ambient glow */
.glow1{position:fixed;top:-300px;right:-300px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,170,.055) 0%,transparent 65%);pointer-events:none;z-index:0}
.glow2{position:fixed;bottom:-200px;left:-150px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,80,180,.05) 0%,transparent 65%);pointer-events:none;z-index:0}

/* fish target card */
.fish-card{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.fish-meta{font-size:11px;color:rgba(255,255,255,.28);margin-top:8px;line-height:1.4}

/* week row */
.week-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}

/* quick pills */
.quick-pill{background:transparent;border:.5px solid rgba(255,255,255,.09);border-radius:20px;padding:4px 12px;color:rgba(255,255,255,.38);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.quick-pill:hover{border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.65)}

/* beach grid */
.beach-btn{background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 15px;text-align:left;cursor:pointer;font-family:inherit;color:#E8EDF2;width:100%;transition:all .2s}
.beach-btn:hover{background:rgba(0,212,170,.07);border-color:rgba(0,212,170,.2)}

/* alerts */
.alert-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.alert-dot{width:8px;height:8px;border-radius:50%;background:#00D4AA;animation:pulse 2s infinite;flex-shrink:0}
.day-pill{border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer;font-family:inherit;border:.5px solid;transition:all .2s}

/* pro tip */
.pro-tip{border-left:2px solid #00D4AA;border-radius:0 14px 14px 0;background:rgba(0,212,170,.025);padding:16px 18px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}

footer{border-top:.5px solid rgba(255,255,255,.05);padding:18px 20px;text-align:center}
footer p{color:rgba(255,255,255,.14);font-size:11px}
footer a{color:rgba(255,255,255,.25)}

.section-label{font-size:10px;letter-spacing:.18em;color:rgba(0,212,170,.65);margin-bottom:8px}
.section-title{font-size:26px;font-weight:600;letter-spacing:-.025em;margin-bottom:4px}
.section-sub{color:rgba(255,255,255,.32);font-size:14px;margin-bottom:24px}

.error-msg{text-align:center;padding:2rem;color:#F87171;font-size:14px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ── MOBILE OPTIMISATIONS ── */
@media(max-width:480px){
  main{padding:14px 12px 80px}
  .nav-inner{padding:0 10px;height:52px}
  .logo-text{font-size:13px}
  .nav-link{padding:6px 8px;font-size:11px}
  .card{padding:12px 14px;border-radius:12px}
  .section-title{font-size:22px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .fish-card{grid-template-columns:1fr;gap:8px}
  .dots span{width:6px!important;height:6px!important}
  .tabs{gap:0}
  .tab{padding:8px 10px;font-size:11px}
}
@media(max-width:360px){
  .logo-sub{display:none}
  .nav-link{padding:5px 7px;font-size:10px}
}
</style>

// Beaufort Wind Scale (km/h thresholds)
function beaufort(kmh){
  if(kmh<1)  return {n:0, label:"Calm",          short:"Calm"};
  if(kmh<6)  return {n:1, label:"Light Air",      short:"Light Air"};
  if(kmh<12) return {n:2, label:"Light Breeze",   short:"Light Breeze"};
  if(kmh<20) return {n:3, label:"Gentle Breeze",  short:"Gentle"};
  if(kmh<29) return {n:4, label:"Moderate Breeze",short:"Moderate"};
  if(kmh<39) return {n:5, label:"Fresh Breeze",   short:"Fresh"};
  if(kmh<50) return {n:6, label:"Strong Breeze",  short:"Strong"};
  if(kmh<62) return {n:7, label:"Near Gale",      short:"Near Gale"};
  if(kmh<75) return {n:8, label:"Gale",           short:"Gale"};
  if(kmh<89) return {n:9, label:"Strong Gale",    short:"Str. Gale"};
  if(kmh<103)return {n:10,label:"Storm",           short:"Storm"};

}

/* ═══════════════════════════════════════
   GUTTER & STRUCTURE SCORE
   Analyses 48hrs of wind + swell history
   to predict beach gutter depth & quality
═══════════════════════════════════════ */
function calcGutterScore(hourlyWindSpeeds, hourlyWindDirs, hourlySwellHeights, beach){
  if(!hourlyWindSpeeds||hourlyWindSpeeds.length<12) return null;

  // Take the last 48 hours of data
  const n = Math.min(48, hourlyWindSpeeds.length);
  const winds  = hourlyWindSpeeds.slice(-n);
  const dirs   = hourlyWindDirs  ? hourlyWindDirs.slice(-n)   : [];
  const swells = hourlySwellHeights ? hourlySwellHeights.slice(-n) : [];

  const faceDeg = beachFaceDegree(beach);

  let onshoreEnergy = 0;   // cumulative onshore wave energy (scouring)
  let offshoreHours = 0;   // hours of offshore/calm (filling)
  let dirtyWaterHours = 0; // hours of excessive chop (too messy)
  let avgSwell = 0, swellCount = 0;
  let peakSwell = 0;
  let onshoreHours = 0;

  const compassMap={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};

  winds.forEach((spd,i)=>{
    if(spd==null) return;
    const swell = swells[i]||0;
    const windDirDeg = dirs[i]!=null ? dirs[i] : null;

    // Determine onshore/offshore from wind direction
    let isOnshore = false, isCross = false;
    if(windDirDeg!=null){
      const windToward = (windDirDeg+180)%360;
      let diff = Math.abs(windToward - faceDeg);
      if(diff>180) diff=360-diff;
      isOnshore = diff<=45;
      isCross   = diff>45 && diff<135;
    }

    // Onshore energy = wind speed × swell height (both pushing water onto beach)
    if(isOnshore && spd>8){
      const energy = (spd/40) * (swell>0 ? Math.min(swell/2,1) : 0.3);
      onshoreEnergy += energy;
      onshoreHours++;
      if(swell>peakSwell) peakSwell=swell;
    }
    // Dirty water: excessive onshore energy (>35km/h + >2m swell)
    if(isOnshore && spd>35 && swell>2.0) dirtyWaterHours++;
    // Filling: offshore/calm conditions for extended periods
    if(!isOnshore && !isCross && (spd<8 || swell<0.3)) offshoreHours++;

    if(swell>0){ avgSwell+=swell; swellCount++; }
  });

  const meanSwell = swellCount>0 ? avgSwell/swellCount : 0;
  const fillRatio = offshoreHours / n; // how much time was spent filling in
  const scourRatio = onshoreHours / n;
  const tooMessy = dirtyWaterHours > n*0.3; // >30% of time was dirty-water messy

  // --- SCORE CALCULATION ---
  // Base score from onshore energy (more = deeper gutters)
  let score = Math.min(10, onshoreEnergy * 12);

  // Penalty for too much filling-in time
  score -= fillRatio * 4;

  // Penalty for too much dirty/churned water (gutters exist but unfishable)
  if(tooMessy) score -= 2;

  // Bonus for moderate consistent swell (ideal gutter former)
  if(meanSwell>=0.6 && meanSwell<=2.0) score += 1.5;
  if(peakSwell>=1.0 && peakSwell<=3.5) score += 1;

  // If basically flat and calm for 48hrs — gutters filled right in
  if(onshoreEnergy<0.5 && meanSwell<0.3) score = Math.min(score, 2);

  score = Math.max(1, Math.min(10, Math.round(score)));

  // --- VERDICT ---
  let label, color, summary, advice;
  if(score>=9){
    label="Prime Structure"; color="#00D4AA";
    summary="48hrs of sustained onshore swell has scoured deep gutters into the beach.";
    advice="Gutters are well-defined and holding water. Fish the edges of the white water — predators are patrolling. Structure is at its productive best.";
  } else if(score>=7){
    label="Good Gutters"; color="#4ADE80";
    summary="Recent onshore conditions have created solid gutter structure.";
    advice="Expect clear gutters running parallel to the beach. Cast to the gutter-sand edge. Good holding water — fish will be using it.";
  } else if(score>=5){
    label="Moderate Structure"; color="#FACC15";
    summary="Some gutter formation but mixed conditions over 48hrs.";
    advice="Gutters are present but may not be well-defined. Walk the beach at low tide to locate the best structure before fishing.";
  } else if(score>=3){
    label="Filling In"; color="#FB923C";
    summary="Calm, offshore conditions over 48hrs have allowed sand to settle.";
    advice="Gutters are shallow and filling in. Look for any remaining depth — rock edges, reef-adjacent depressions, or beach entries/exits where water flows.";
  } else {
    label="Flat Beach"; color="#F87171";
    summary="Extended calm has flattened the beach. Little productive structure.";
    advice="Beach is likely uniform and shallow. Best option is to fish rock edges, headland base, or wait for the next onshore swell event to rebuild structure.";
  }

  // Dirty water warning override
  if(tooMessy && score>=5){
    label="Messy — Recover Soon"; color="#FACC15";
    advice="Heavy onshore conditions have created structure but water is too dirty for clear fishing. Give it 6–12hrs after conditions ease — the gutters will be prime once clarity returns.";
  }

  return { score, label, color, summary, advice, peakSwell:peakSwell.toFixed(1), meanSwell:meanSwell.toFixed(1), onshoreHours, fillHours:offshoreHours, tooMessy };
}

function beachFaceDegree(beach) {
  const lat=beach.lat, lon=beach.lon, s=beach.s;
  if (s==="NSW") { if (lat > -32) return 80; return 90; }
  if (s==="QLD") { if (lon > 153) return 75; if (lat < -20) return 60; if (lat < -16) return 30; return 0; }
  if (s==="VIC") { if (lon < 143) return 210; if (lon < 145) return 190; if (lon > 147) return 160; return 180; }
  if (s==="TAS") { if (lat < -43) return 200; if (lon > 148) return 110; return 270; }
  if (s==="SA")  { if (lon < 133.5) return 195; if (lon < 136) return 175; if (lon < 138) return 235; if (lon > 139 && lat < -35.5) return 175; return 270; }
  if (s==="WA")  { if (lat > -22 && lon < 114.5) return 300; if (lat > -28 && lon < 114.5) return 280; if (lat > -32) return 285; if (lon < 115.5) return 270; if (lat < -33.5) return 225; return 270; }
  if (s==="NT")  { if (lon < 132) return 315; return 330; }
  return 90;
}

// Determine onshore/offshore/cross-shore for a beach + wind direction
// Returns {label, short, color, bg, border, isOnshore, isCross, note} or null
function windShore(windDirStr, beach) {
  if (!windDirStr || !beach) return null;
  const compassMap={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
  const windFromDeg=compassMap[windDirStr];
  if (windFromDeg===undefined) return null;
  const faceDeg=beachFaceDegree(beach);
  // ONSHORE = wind FROM the sea = wind FROM a direction near the beach face
  let diff=Math.abs(windFromDeg-faceDeg);
  if (diff>180) diff=360-diff;
  const faceCompass=degToCompass(Math.round(faceDeg/22.5)*22.5%360);
  if (diff<=45) return {
    label:"Onshore", short:"ONSHORE", color:"#F87171",
    bg:"rgba(248,113,113,.1)", border:"rgba(248,113,113,.25)",
    isOnshore:true, isCross:false,
    note:`${windDirStr} wind blowing onto the beach (faces ${faceCompass}). Increases surface chop — bait gets pushed into gutters.`
  };
  if (diff>=135) return {
    label:"Offshore", short:"OFFSHORE", color:"#00D4AA",
    bg:"rgba(0,212,170,.1)", border:"rgba(0,212,170,.25)",
    isOnshore:false, isCross:false,
    note:`${windDirStr} wind blowing off the beach (faces ${faceCompass}). Flat water surface, clean presentation, good casting.`
  };
  return {
    label:"Cross-shore", short:"CROSS", color:"#FACC15",
    bg:"rgba(250,204,21,.08)", border:"rgba(250,204,21,.22)",
    isOnshore:false, isCross:true,
    note:`${windDirStr} wind blowing along the beach (faces ${faceCompass}). Moderate surface texture, some drift.`
  };
}

// Parse high/low tide events from Open-Meteo hourly sea_level_height_msl data
// times[] are local ISO strings "YYYY-MM-DDTHH:MM", heights[] are metres above MSL
// dayOffset: 0=today, 1=tomorrow etc (relative to the first time entry's date)
function tidesFromSeaLevel(times, heights, dayOffset) {
  if (!times || !heights || times.length < 3) return [];

  // Group into per-day buckets using the date prefix of each ISO string
  const allDates = [...new Set(times.map(t => t.slice(0,10)))];
  const targetDate = allDates[dayOffset];
  if (!targetDate) return [];

  // Get indices for this day
  const dayIdxs = times.map((t,i) => t.startsWith(targetDate) ? i : -1).filter(i => i >= 0);
  if (dayIdxs.length < 3) return [];

  const events = [];
  for (let j = 1; j < dayIdxs.length - 1; j++) {
    const i     = dayIdxs[j];
    const prev  = heights[i - 1];
    const cur   = heights[i];
    const next  = heights[i + 1];
    if (cur == null || prev == null || next == null) continue;
    const isPeak   = cur > prev && cur >= next;
    const isTrough = cur < prev && cur <= next;
    if (isPeak || isTrough) {
      // Refine time by interpolating between surrounding points
      const timeStr = times[i].slice(11, 16); // "HH:MM"
      events.push({
        time: timeStr,
        h:    parseFloat(cur.toFixed(2)),
        type: isPeak ? "High" : "Low"
      });
    }
  }

  // De-duplicate consecutive same-type events (keep the more extreme one)
  const deduped = [];
  for (const e of events) {
    if (!deduped.length || deduped[deduped.length-1].type !== e.type) {
      deduped.push(e);
    } else {
      const prev = deduped[deduped.length-1];
      if (e.type === "High" ? e.h > prev.h : e.h < prev.h) deduped[deduped.length-1] = e;
    }
  }

  return deduped.slice(0, 4);
}

// Keep mathTides as emergency fallback only (no network available)
function mathTides(beach, tzOffsetHours) {
  return mathTidesForDay(beach, tzOffsetHours, 0);
}
function mathTidesForDay(beach, tzOffsetHours, dayOffset) {
  const PERIOD_MIN=745;
  const phaseOffset=((beach.lon*4.3+beach.lat*2.1)%PERIOD_MIN+PERIOD_MIN)%PERIOD_MIN;
  let range=1.2;
  if(beach.s==="NT")range=4.5;else if(beach.s==="WA"&&beach.lat>-25)range=3.8;
  else if(beach.s==="SA")range=2.8;else if(beach.s==="QLD"&&beach.lat>-20)range=3.0;
  else if(beach.s==="QLD")range=1.4;else if(beach.s==="NSW")range=1.3;
  else if(beach.s==="TAS")range=1.1;else if(beach.s==="VIC")range=0.9;
  else if(beach.s==="WA")range=0.7;
  const mid=range*0.5,amp=range*0.5;
  const tzOff=tzOffsetHours*60;
  const localNowMin=Date.now()/60000+tzOff;
  const localMidnight=Math.floor(localNowMin/1440)*1440+dayOffset*1440;
  const tides=[];
  for(let m=0;m<1440;m++){
    const abs=localMidnight+m;
    const ang=((abs+phaseOffset)%PERIOD_MIN)/PERIOD_MIN*2*Math.PI;
    const angP=((abs-1+phaseOffset)%PERIOD_MIN)/PERIOD_MIN*2*Math.PI;
    const angN=((abs+1+phaseOffset)%PERIOD_MIN)/PERIOD_MIN*2*Math.PI;
    const h=mid+amp*Math.cos(ang),hP=mid+amp*Math.cos(angP),hN=mid+amp*Math.cos(angN);
    if((h>hP&&h>hN)||(h<hP&&h<hN))tides.push({time:`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`,h:parseFloat(h.toFixed(1)),type:h>hP?"High":"Low"});
  }
  const out=[];
  for(const t of tides){if(!out.length||out[out.length-1].type!==t.type)out.push(t);if(out.length===4)break;}
  return out;
}

function tidePhaseFromTides(tides) {
  if (!tides || !tides.length) { const h=new Date().getHours(); return h>=6&&h<12?"incoming":h>=12&&h<15?"high":h>=15&&h<21?"outgoing":"low"; }
  const nowMins = new Date().getHours()*60 + new Date().getMinutes();
  const toMins  = t => { const [hh,mm]=t.split(":").map(Number); return hh*60+mm; };
  const past    = tides.filter(t => toMins(t.time) <= nowMins);
  const last    = past[past.length-1];
  if (!last) return tides[0].type === "High" ? "outgoing" : "incoming";
  return last.type === "High" ? "outgoing" : "incoming";
}

// Season penalty: how far is current month from peak months for this species/state?
function seasonScore(key, state){
  const sp = SPECIES_CONDITIONS[key];
  if(!sp?.peakMonths) return 7; // neutral if no data
  const month = new Date().getMonth()+1; // 1-12
  const peaks = sp.peakMonths[state] || sp.peakMonths.default || [];
  if(peaks.length===0) return 7;
  if(peaks.includes(month)) return 10;
  // Check adjacent months (one off = still good)
  const prev = month===1?12:month-1;
  const next = month===12?1:month+1;
  if(peaks.includes(prev)||peaks.includes(next)) return 7;
  // Two months away
  const prev2 = prev===1?12:prev-1;
  const next2 = next===12?1:next+1;
  if(peaks.includes(prev2)||peaks.includes(next2)) return 4;
  return 2; // off season
}

// Time-of-day score: are we in a peak feeding window for this species?
function timeOfDayScore(key){
  const sp = SPECIES_CONDITIONS[key];
  if(!sp?.peakHours) return 7;
  const hr = new Date().getHours();
  // Check if this is a predominantly nocturnal/crepuscular species
  // (most peak hours are in evening/night, not daytime)
  const nightPeakCount = sp.peakHours.filter(([s,e])=>s>=17||e<=8).length;
  const isNocturnal = nightPeakCount >= sp.peakHours.length;

  // Check if we are inside a peak window
  for(const [start,end] of sp.peakHours){
    if(start<=end ? (hr>=start&&hr<end) : (hr>=start||hr<end)) return 10;
  }
  // Check 1hr buffer around any peak window
  for(const [start,end] of sp.peakHours){
    const s1=(start-1+24)%24, e1=(end+1)%24;
    if(s1<=e1 ? (hr>=s1&&hr<e1) : (hr>=s1||hr<e1)) return 7;
  }
  // Mid-day is terrible for nocturnal species
  if(isNocturnal && hr>=9 && hr<=17) return 1;
  return 4;
}

function scoreConditions(key,wx,moonPhase){
  const sp=SPECIES_CONDITIONS[key],fd=FISH[key];
  if(!sp||!fd)return{total:5,label:"Average",color:"#FBB040",factors:[],note:""};
  const state = currentLocation?.s||"NSW";
  let total=0,max=0;const factors=[];

  // ── Water Temp (weight 18) ──────────────────────────────────────
  const wt=wx.waterTemp;
  let tS=wt>=sp.waterTemp.ideal[0]&&wt<=sp.waterTemp.ideal[1]?10:wt>=sp.waterTemp.ok[0]&&wt<=sp.waterTemp.ok[1]?6:Math.max(0,3-(Math.abs(wt-(wt<sp.waterTemp.ok[0]?sp.waterTemp.ok[0]:sp.waterTemp.ok[1]))*1.5));
  total+=tS*12;max+=120;
  factors.push({name:"Water Temp",icon:"&#127777;",score:tS,value:wt+"&#xB0;C",detail:tS>=9?wt+"&#xB0;C — ideal range ("+sp.waterTemp.ideal[0]+"–"+sp.waterTemp.ideal[1]+"&#xB0;C)":tS>=6?wt+"&#xB0;C — acceptable but not ideal":wt+"&#xB0;C — outside comfortable range, fish sluggish"});

  // ── Season / Month (weight 18) — NEW ───────────────────────────
  const ssnS = seasonScore(key, state);
  total+=ssnS*10;max+=100;
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const peakStr=(sp.peakMonths[state]||sp.peakMonths.default||[]).map(m=>monthNames[m-1]).join(", ");
  factors.push({name:"Season",icon:"&#128197;",score:ssnS,value:monthNames[new Date().getMonth()]+" in "+state,detail:ssnS>=9?"Peak season for "+fd.label+" in "+state+(peakStr?" ("+peakStr+")":""):ssnS>=7?"Good season — approaching peak ("+peakStr+")":ssnS>=4?"Shoulder season — "+fd.label+" less active in "+state+" this month":"Off season for "+fd.label+" in "+state+". Peak: "+peakStr});

  // ── Time of Day (weight 20) — NEW ──────────────────────────────
  const todS = timeOfDayScore(key);
  total+=todS*35;max+=350;
  const hr=new Date().getHours();
  const isNocturnal=sp.peakHours.every(([s])=>s>=18||s<=4);
  const hrLabel=hr<5?"night":hr<8?"dawn":hr<11?"morning":hr<14?"midday":hr<17?"afternoon":hr<20?"evening":"night";
  const todDetail = todS>=9?"Prime feeding window for "+fd.label+" right now":todS>=7?"Approaching peak feeding time":todS<=2?"Worst time for "+fd.label+" — strongly nocturnal. Come back at dusk/night.":todS<=4?isNocturnal?"Daytime: "+fd.label+" are resting. Peak feeding is after dark.":"Quiet period — try at dawn or dusk":"Average feeding activity at "+hrLabel;
  factors.push({name:"Time of Day",icon:"&#9200;",score:todS,value:hrLabel.charAt(0).toUpperCase()+hrLabel.slice(1),detail:todDetail});

  // ── Barometric Pressure (weight 15) ────────────────────────────
  const p=wx.pressure;let pS=0,pD="";
  if(p>=1005&&p<=1022){
    const isStableGood=(sp.pressure.best==="stable_high"||sp.pressure.best==="stable");
    const isStableBad=(sp.pressure.bad==="stable_high"||sp.pressure.bad==="high_stable");
    pS=isStableGood?9:isStableBad?5:7;
    pD=p+" hPa — stable pressure "+(isStableGood?"(ideal for "+fd.label+")":isStableBad?"(can slow the bite)":"(good feeding conditions)");
  } else if(p<1005&&p>=998){
    pS=sp.pressure.best==="falling"?10:5;
    pD=p+" hPa — "+(sp.pressure.best==="falling"?"FALLING — pre-frontal feeding surge!":"falling pressure, fish may be unsettled");
  } else if(p<998){pS=2;pD=p+" hPa — active storm, most fish deep and inactive";}
  else if(p>1022&&p<=1030){
    const isBadHigh=(sp.pressure.bad==="high_stable"||sp.pressure.bad==="stable_high");
    pS=isBadHigh?3:(sp.pressure.best==="stable_high"?9:6);
    pD=p+" hPa — "+(isBadHigh?"high-pressure bluebird — fish lethargic for "+fd.label:"stable high, reasonable conditions");
  } else {pS=2;pD=p+" hPa — very high pressure, fish pushed deep";}
  total+=pS*15;max+=150;
  factors.push({name:"Pressure",icon:"&#128309;",score:pS,value:p+" hPa",detail:pD});

  // ── Wind (weight 10) — inverted for roughWater="loves" species ──
  const wind=wx.wind;
  let wS;
  if(sp.roughWater==="loves"){
    // Snapper/salmon PREFER chop — calm = bad, moderate = great, very rough = ok
    wS = wind>=20&&wind<=38?10 : wind>=14&&wind<=45?7 : wind>=8?3 : 1;
  } else {
    wS = wind<=sp.wind.idealMax?10 : wind<=sp.wind.okMax?7 : wind<=sp.wind.rough?4 : 1;
  }
  total+=wS*10;max+=100;
  factors.push({name:"Wind",icon:"&#128168;",score:wS,value:wind+" km/h — "+beaufort(wind).label+" · "+wx.windDir,detail:sp.roughWater==="loves"?(wS>=8?wind+"km/h — good chop for "+fd.label:wS>=5?wind+"km/h — marginal for "+fd.label:"Calm "+wind+"km/h — "+fd.label+" prefer rough, dirty water"):(wS>=9?"Light wind — excellent":wS>=7?"Moderate — manageable":wS>=4?"Strong — challenging":"Very strong — difficult")});

  // ── Swell (weight 10) — inverted for roughWater="loves" species ──
  const sw=wx.swellH;
  let swS;
  if(sp.roughWater==="loves"){
    // Calm flat sea = bad. 1–4m swell = great. Storm swell = still ok.
    swS = sw>=1.5&&sw<=4.0?10 : sw>=1.0&&sw<=5.0?6 : sw>=0.4?2 : 1;
  } else if(sp.roughWater==="likes"){
    swS = sw<=sp.swell.idealMax?8 : sw<=sp.swell.okMax?9 : sw<=sp.swell.rough?6 : 2;
  } else {
    swS = sw<=sp.swell.idealMax?10 : sw<=sp.swell.okMax?7 : sw<=sp.swell.rough?4 : 1;
  }
  total+=swS*10;max+=100;
  factors.push({name:"Swell",icon:"&#127754;",score:swS,value:sw+"m",detail:sp.roughWater==="loves"?(swS>=9?sw+"m swell — excellent, brings "+fd.label+" inshore":swS>=7?sw+"m — decent for "+fd.label:"Flat "+sw+"m — "+fd.label+" need swell and turbidity to come within casting range"):(swS>=9?sw+"m — ideal":swS>=7?sw+"m — manageable":swS>=4?sw+"m — rougher than ideal":sw+"m — too rough")});


  // ── Tide Phase (weight 10) ─────────────────────────────────────
  const tide=wx.tidePhase;let tidS=sp.tides.best.includes(tide)?10:sp.tides.good?.includes(tide)?7:sp.tides.ok?.includes(tide)?4:3;
  total+=tidS*10;max+=100;const tLabel=tide.charAt(0).toUpperCase()+tide.slice(1);
  factors.push({name:"Tide Phase",icon:"&#127754;",score:tidS,value:tLabel,detail:tidS>=9?tLabel+" tide — prime window for "+fd.label:tidS>=7?tLabel+" tide — good for "+fd.label:tLabel+" tide — not ideal for "+fd.label});

  // ── Moon Phase (weight 7) ──────────────────────────────────────
  const phase=moonPhase!=null?moonPhase:0.5;const dNew=Math.min(phase,1-phase),dFull=Math.abs(phase-0.5),near=Math.min(dNew,dFull);
  let mS=near<0.03?10:near<0.07?9:near<0.12?7:near<0.2?6:near<0.25?4:5;
  total+=mS*7;max+=70;const moonPct=Math.round((1-Math.cos(phase*2*Math.PI))/2*100);
  factors.push({name:"Moon Phase",icon:"&#127769;",score:mS,value:moonPct+"% illuminated",detail:mS>=9?"New/full moon — peak tidal pull and feeding activity":mS>=7?"Building to new/full moon — above average":mS<=4?"Quarter moon — weakest tidal pull":"Mid-cycle moon — average conditions"});

  // ── Sky & Light (weight 7) ─────────────────────────────────────
  const wc=wx.wmoCode||0;let skyS=5;
  const isStorm=wc>=95,isRain=wc>=50&&wc<=82,isOvc=wc===3,isCloudy=wc>=1&&wc<=2,isClear=wc===0;
  if(isStorm)skyS=1;
  else if(isRain&&(key==="tailor"||key==="mulloway"||key==="salmon"))skyS=9;
  else if(isRain)skyS=5;
  else if(isOvc&&(sp.lightSens==="very_high"||sp.lightSens==="high"))skyS=10;
  else if(isOvc)skyS=7;
  else if(isCloudy&&(sp.lightSens==="very_high"||sp.lightSens==="high"))skyS=8;
  else if(isCloudy)skyS=7;
  else if(isClear&&sp.lightSens==="very_high")skyS=3;
  else if(isClear&&sp.lightSens==="high")skyS=5;
  else if(isClear&&key==="kingfish")skyS=9;
  else skyS=6;
  total+=skyS*7;max+=70;
  const skyTxt=isStorm?"Thunderstorm":isRain?"Rain/Showers":isOvc?"Overcast":isCloudy?"Partly Cloudy":"Clear sky";
  factors.push({name:"Sky / Light",icon:"&#9925;",score:skyS,value:skyTxt,detail:skyS>=9?"Overcast / rain — ideal low-light for "+fd.label:skyS>=7?"Good cloud cover reducing light penetration":skyS<=3?"Bright clear sky — "+fd.label+" avoiding exposed water":"Average sky conditions"});

  // ── Score → rating ─────────────────────────────────────────────
  const rawPct=total/max;
  const pctScore=Math.round(rawPct*100);
  // Map percentage directly to rating — all conditions must contribute
  // >90% = excellent, >80% = great, >70% = good, >50% = fair, etc.
  let stars = pctScore>=90?9 : pctScore>=80?8 : pctScore>=70?7 : pctScore>=60?6 : pctScore>=50?5 : pctScore>=40?4 : pctScore>=30?3 : pctScore>=20?2 : 1;
  // Perfect (10) only if 96%+
  if(pctScore>=96) stars=10;
  const condStrMap={10:"perfect",9:"excellent",8:"great",7:"good",6:"fair",5:"average",4:"mediocre",3:"poor",2:"terrible",1:"abysmal"};
  let condStr=condStrMap[stars]||"average";

  // ── HARD CAPS — override weighted score for biological reality ──
  // A nocturnal species during midday cannot be more than POOR (3)
  // regardless of how good season/weather/pressure are
  if(todS===1 && stars>3){ stars=3; }
  // Off-season (2/10) caps at MEDIOCRE (4) — fish present but not feeding
  if(ssnS<=2 && stars>4){ stars=4; }
  // Both wrong time AND off-season → ABYSMAL
  if(todS===1 && ssnS<=2){ stars=1; }

  // ── SLOW PERIOD SYNC ────────────────────────────────────────────
  const isMid=hr>=10&&hr<=16;
  const isBluebird=wx.pressure>1025&&(wx.wmoCode===0||wx.wmoCode<=2);
  const badFactors=factors.filter(f=>f.score<=3).map(f=>f.name);
  let lockjawActive=false,lockjawReason="";

  if(isBluebird&&(sp.lightSens==="very_high"||sp.lightSens==="high")){
    lockjawActive=true;lockjawReason="Clear skies and high pressure can push light-sensitive fish into shade. "+fd.label+" tend to be quieter — dawn, dusk or an overcast day will fish better.";
  } else if(wx.pressure>1030){
    lockjawActive=true;lockjawReason="Very high pressure can slow the bite for several species. It's still worth a cast — use finesse presentations or try low-light sessions.";
  } else if(wx.pressure<998){
    lockjawActive=true;lockjawReason="Active storm system pushing fish deeper. Fishing usually picks up nicely once the front passes.";
  } else if(isMid&&sp.lightSens==="very_high"){
    lockjawActive=true;lockjawReason=fd.label+" often shut down in bright midday light. You'll likely do better at dawn or dusk.";
  } else if(wx.swellH>sp.swell.rough){
    lockjawActive=true;lockjawReason="Swell ("+wx.swellH+"m) is churning up sand and reducing clarity. Look for a sheltered gutter or wait for it to ease.";
  } else if(badFactors.length>=3){
    lockjawActive=true;lockjawReason="Several factors ("+badFactors.slice(0,2).join(", ")+") aren't ideal right now. Fish are catchable — just temper expectations.";
  }

  if(lockjawActive&&stars>=7){lockjawActive=false;lockjawReason="";}
  if(lockjawActive&&stars>=5){stars=4;}
  condStr=condStrMap[stars]||"average";

  return{total:stars,pct:pctScore,label:condLabel(condStr),color:condColor(condStr),cond:condStr,factors,note:sp.notes,lockjawActive,lockjawReason};
}

function scorefish(key,wx){if(!wx)return 3;return scoreConditions(key,wx,currentMoon?currentMoon.phase:null).total;}

function fishBestTime(key){
  const sp=SPECIES_CONDITIONS[key];
  if(!sp?.peakHours) return "Moving tide";
  const hrs=sp.peakHours;
  const labels={snapper:"Dusk to midnight",mulloway:"After dark — outgoing tide",jewfish:"Night — tide change",tailor:"Dawn or dusk only",bream:"Dawn or dusk",salmon:"Dawn — rough surf day",kingfish:"Dawn headland",flathead:"Tide change — morning or afternoon",whiting:"Morning or late afternoon",luderick:"Overcast day — incoming tide"};
  return labels[key]||"Moving tide — dawn or dusk";
}

function buildDashVerdict(key, sc){
  const fd = FISH[key];
  if(!sc||!fd) return "";
  const state = currentLocation?.s||"";
  const hr = new Date().getHours();
  const month = new Date().getMonth()+1;
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // Pull out specific factor scores for the verdict
  const todFactor   = sc.factors.find(f=>f.name==="Time of Day");
  const ssnFactor   = sc.factors.find(f=>f.name==="Season");
  const windFactor  = sc.factors.find(f=>f.name==="Wind");
  const swellFactor = sc.factors.find(f=>f.name==="Swell");
  const pressFactor = sc.factors.find(f=>f.name==="Pressure");
  const skyFactor   = sc.factors.find(f=>f.name==="Sky / Light");

  const todS   = todFactor?.score||5;
  const ssnS   = ssnFactor?.score||5;
  const windS  = windFactor?.score||5;
  const swellS = swellFactor?.score||5;
  const pressS = pressFactor?.score||5;

  // Build the verdict sentence parts
  const reasons = [];
  const warnings = [];

  // Time of day
  if(todS===10) reasons.push("you're fishing in the prime feeding window");
  else if(todS>=7) reasons.push("approaching the best time of day");
  else if(todS<=2) warnings.push(fd.label+" are not actively feeding at this hour — strongly nocturnal/crepuscular species");
  else if(todS<=4) warnings.push("outside peak feeding hours for "+fd.label);

  // Season
  if(ssnS===10) reasons.push("it's peak season"+(state?" in "+state:""));
  else if(ssnS>=7) reasons.push("approaching the seasonal peak");
  else if(ssnS<=2) warnings.push("well outside the peak season for "+fd.label+(state?" in "+state:""));

  // Pressure
  if(pressS===10) reasons.push("pressure is falling — pre-frontal feeding surge");
  else if(pressS>=8) reasons.push("favourable barometric pressure");
  else if(pressS<=3) warnings.push("barometric pressure is suppressing the bite");

  // Wind / swell for rough-water species
  const sp = SPECIES_CONDITIONS[key];
  if(sp?.roughWater==="loves"){
    if(windS>=8&&swellS>=8) reasons.push("rough conditions are exactly what "+fd.label+" want");

    else if(windS<=3) warnings.push("wind is too strong for comfortable fishing");

  }

  // Sky
  if(skyFactor?.score>=9&&(sp?.lightSens==="very_high"||sp?.lightSens==="high")) reasons.push("overcast sky is perfect for this light-sensitive species");

  } else if(sc.total>=6){
    verdict = "✅ <strong>"+sc.label+" conditions</strong> — worth a cast. ";
    if(reasons.length) verdict += reasons[0];
    if(warnings.length) verdict += (reasons.length?". However, ":"")+warnings[0]+".";
  } else if(sc.total>=4){
    verdict = "⚠️ <strong>"+sc.label+" conditions</strong> for "+fd.label+". ";
    if(warnings.length) verdict += warnings.slice(0,2).join(". ")+".";
    else if(reasons.length) verdict += "Some positive factors: "+reasons[0]+".";
  } else {
    verdict = "❌ <strong>"+sc.label+" conditions</strong>. Not a recommended target right now. ";
    if(warnings.length) verdict += warnings[0]+".";
  }

  // Add the species notes as a second line if it exists
  const noteHtml = "";

  const bg = sc.total>=8?"rgba(0,212,170,.08)":sc.total>=6?"rgba(74,222,128,.06)":sc.total>=4?"rgba(250,204,21,.06)":"rgba(248,113,113,.06)";
  const border = sc.total>=8?"rgba(0,212,170,.2)":sc.total>=6?"rgba(74,222,128,.15)":sc.total>=4?"rgba(250,204,21,.18)":"rgba(248,113,113,.18)";

  return `<div style="background:${bg};border:.5px solid ${border};border-radius:10px;padding:12px 14px;margin-bottom:14px">
    <div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.6">${verdict}</div>
    ${noteHtml}
  </div>`;
}

   MOON PHASE & BITE TIME ENGINE
   Pure astronomy — no API needed.
   Based on the Jean Meeus lunar algorithm.
═══════════════════════════════════════ */

function moonData(date) {
  // Known new moon reference: Jan 6 2000 18:14 UTC
  const REF_NEW_MOON = new Date(Date.UTC(2000, 0, 6, 18, 14));
  const SYNODIC = 29.530588853; // days
  const elapsed = (date - REF_NEW_MOON) / (1000 * 60 * 60 * 24);
  const cycles  = ((elapsed % SYNODIC) + SYNODIC) % SYNODIC;
  const phase   = cycles / SYNODIC; // 0=new, 0.25=first quarter, 0.5=full, 0.75=last quarter

  const PHASES = [
    { name:"New Moon",        emoji:"🌑", range:[0,    0.025] },
    { name:"Waxing Crescent", emoji:"🌒", range:[0.025,0.23 ] },
    { name:"First Quarter",   emoji:"🌓", range:[0.23, 0.27 ] },
    { name:"Waxing Gibbous",  emoji:"🌔", range:[0.27, 0.475] },
    { name:"Full Moon",       emoji:"🌕", range:[0.475,0.525] },
    { name:"Waning Gibbous",  emoji:"🌖", range:[0.525,0.73 ] },
    { name:"Last Quarter",    emoji:"🌗", range:[0.73, 0.77 ] },
    { name:"Waning Crescent", emoji:"🌘", range:[0.77, 1.0  ] },
  ];
  const p = PHASES.find(p => phase >= p.range[0] && phase < p.range[1]) || PHASES[0];

  // Illumination %
  const illum = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);

  // Days to next full and new moon
  const daysToFull = phase < 0.5
    ? (0.5 - phase) * SYNODIC
    : (1.5 - phase) * SYNODIC;
  const daysToNew  = phase < 1
    ? (1 - phase) * SYNODIC
    : SYNODIC - phase * SYNODIC;

  // Fishing rating boost: new & full moon = peak, quarters = good
  let fishRating;
  if      (phase < 0.05 || phase > 0.95)                 fishRating = 5; // New moon
  else if (phase > 0.45 && phase < 0.55)                 fishRating = 5; // Full moon
  else if ((phase > 0.2 && phase < 0.3) ||
           (phase > 0.7 && phase < 0.8))                 fishRating = 3; // Quarters
  else if (phase < 0.15 || phase > 0.85 ||
           (phase > 0.38 && phase < 0.62))                fishRating = 4; // Near new/full
  else                                                    fishRating = 2;

  const fishNote = fishRating >= 5 ? "Peak feeding — new/full moon drives maximum tidal force"
                 : fishRating >= 4 ? "Good feeding activity — moon exerting strong tidal pull"
                 : fishRating >= 3 ? "Moderate — quarter moon, tidal movement reduced"
                 :                   "Slower period between moon phases";

  return { phase, cycles, phaseName: p.name, emoji: p.emoji, illum,
           daysToFull: daysToFull.toFixed(1), daysToNew: daysToNew.toFixed(1),
           fishRating, fishNote };
}

// Astronomical moonrise/moonset calculator (Jean Meeus simplified)
// Returns { moonrise:"HH:MM", moonset:"HH:MM", moonriseISO, moonsetISO } in local beach time
function moonAstro(date, lat, lon, tzOffsetHours) {
  const rad = Math.PI / 180, deg = 180 / Math.PI;

  function jd(d) {
    const y=d.getUTCFullYear(), m=d.getUTCMonth()+1, day=d.getUTCDate();
    const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
    return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524.5;
  }

  function moonPos(jdVal) {
    const T=(jdVal-2451545.0)/36525;
    const L0=218.3164477+481267.88123421*T;
    const M =357.5291092+35999.0502909*T;
    const Mm=134.9633964+477198.8675055*T;
    const D =297.8501921+445267.1114034*T;
    const F =93.2720950 +483202.0175233*T;
    const lon2=L0+6.289*Math.sin(rad*Mm)-1.274*Math.sin(rad*(2*D-Mm))
              +0.658*Math.sin(rad*2*D)-0.214*Math.sin(rad*2*Mm)-0.186*Math.sin(rad*M);
    const lat2=5.128*Math.sin(rad*F);
    const eps=23.4397-0.0130*T;
    const RA =Math.atan2(Math.sin(rad*lon2)*Math.cos(rad*eps)-Math.tan(rad*lat2)*Math.sin(rad*eps), Math.cos(rad*lon2))*deg;
    const Dec=Math.asin(Math.sin(rad*lat2)*Math.cos(rad*eps)+Math.cos(rad*lat2)*Math.sin(rad*eps)*Math.sin(rad*lon2))*deg;
    return { ra:((RA%360)+360)%360, dec:Dec };
  }

  function getAlt(jdVal) {
    const { ra, dec } = moonPos(jdVal);
    const GMST = (280.46061837 + 360.98564736629*(jdVal-2451545.0)) % 360;
    const LST  = ((GMST + lon + 360) % 360);
    const HA   = LST - ra;
    return Math.asin(
      Math.sin(rad*lat)*Math.sin(rad*dec) +
      Math.cos(rad*lat)*Math.cos(rad*dec)*Math.cos(rad*HA)
    ) * deg;
  }

  // Moon's geometric rise/set altitude: accounts for semi-diameter (~0.272°) + refraction (~0.567°) - parallax (~0.95°)
  const H0 = 0.125; // ≈ 0.7' net correction for moon (lower than sun due to large parallax)

  const todayUtcJD = jd(new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate())));
  const results = [];
  let prevAlt = null;

  // 1-minute steps for accuracy
  for (let m = 0; m <= 1440; m++) {
    const tFrac = m / 1440;
    const jdNow = todayUtcJD + tFrac - tzOffsetHours/24;
    const alt   = getAlt(jdNow);
    if (prevAlt !== null) {
      if (prevAlt < H0 && alt >= H0) results.push({ type:"rise", frac:tFrac });
      if (prevAlt >= H0 && alt < H0) results.push({ type:"set",  frac:tFrac });
    }
    prevAlt = alt;
  }

  const fmt = frac => {
    const t = Math.round(frac * 1440);
    return String(Math.floor(t/60)%24).padStart(2,"0")+":"+String(t%60).padStart(2,"0");
  };
  const toISO = frac => {
    const base = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
    return base.toISOString().slice(0,10)+"T"+fmt(frac);
  };

  const rise = results.find(r=>r.type==="rise");
  const set  = results.find(r=>r.type==="set");
  return {
    moonrise:    rise ? fmt(rise.frac) : null,
    moonset:     set  ? fmt(set.frac)  : null,
    moonriseISO: rise ? toISO(rise.frac) : null,
    moonsetISO:  set  ? toISO(set.frac)  : null,
  };
}

// Major/Minor solunar bite windows from moonrise/moonset times
function solunarTimes(moonriseISO, moonsetISO, tzOffsetHours) {
  // Accept either "YYYY-MM-DDTHH:MM" ISO strings or plain "HH:MM" strings
  const fmt = s => { if (!s) return null; return s.length > 5 ? s.slice(11,16) : s; };
  const addMins = (timeStr, mins) => {
    if (!timeStr) return null;
    const [hh, mm] = timeStr.split(":").map(Number);
    const total = hh*60 + mm + mins;
    const th = Math.floor(((total%1440)+1440)%1440/60);
    const tm = ((total%1440)+1440)%1440%60;
    return String(th).padStart(2,"0")+":"+String(tm).padStart(2,"0");
  };
  const moonrise = fmt(moonriseISO);
  const moonset  = fmt(moonsetISO);
  const majors=[], minors=[];
  if (moonrise) {
    majors.push({ label:"Major (Moonrise)",      start:addMins(moonrise,-60),   end:addMins(moonrise,60),   centre:moonrise });
    minors.push({ label:"Minor (Moon Overhead)",  start:addMins(moonrise,312),   end:addMins(moonrise,372),  centre:addMins(moonrise,342) });
  }
  if (moonset) {
    majors.push({ label:"Major (Moonset)",        start:addMins(moonset,-60),    end:addMins(moonset,60),    centre:moonset });
    minors.push({ label:"Minor (Moon Underfoot)", start:addMins(moonset,312),    end:addMins(moonset,372),   centre:addMins(moonset,342) });
  }
  const all = [...majors,...minors].filter(w=>w.start).sort((a,b)=>a.start.localeCompare(b.start));
  const nowMins = new Date().getHours()*60+new Date().getMinutes();
  const toM = s => { if(!s) return 0; const [h,m]=s.split(":").map(Number); return h*60+m; };
  all.forEach(w => {
    const s=toM(w.start), e=toM(w.end);
    w.status = (nowMins>=s&&nowMins<=e)?"active":s>nowMins?"upcoming":"past";
  });
  return all;
}

// Infer Australian state from lat/lon bounding boxes (rough but reliable)
function inferState(lat, lon){
  if(lat<-10.5&&lat>-29&&lon>129&&lon<138) return "NT";
  if(lat<-10&&lat>-26&&lon>136&&lon<154) return "QLD";
  if(lat>=-29&&lat<-10&&lon>138&&lon<154) return "QLD";
  if(lat<=-29&&lat>-38&&lon>141&&lon<154) return "NSW";
  if(lat<=-34&&lat>-39.2&&lon>140.9&&lon<150) return "VIC";
  if(lat<-39.2&&lon>144&&lon<149) return "TAS";
  if(lat<-26&&lat>-38&&lon>129&&lon<141) return "SA";
  if(lon<129) return "WA";
  if(lat>-36&&lat<-28&&lon>149&&lon<154) return "NSW";
  return "AU";
}

    const detectedPhase=tidePhaseFromTides(tidePredictions);
    currentWeather={temp:Math.round(c.temperature_2m),feelsLike:Math.round(c.apparent_temperature),wind:Math.round(c.wind_speed_10m),windDir:degToCompass(c.wind_direction_10m),condition:wmoDesc(c.weather_code),wmoCode:c.weather_code,humidity:c.relative_humidity_2m,pressure:Math.round(c.surface_pressure),waterTemp,swellH,swellP,swellDir,tidePhase:detectedPhase};

      if(pressureTrend==="falling"||pressureTrend==="falling_fast")rating++;

      const REF=new Date(Date.UTC(2000,0,6,18,14)),SYNODIC=29.530588853;

      const dayTopFish=Object.keys(FISH).map(k=>{

    const weekMoonPhase = currentWeekForecast[3]?.moonPhaseForDay||0.5; // mid-week moon
    const weekWx={waterTemp:currentWeather.waterTemp,wind:weekAvgWind,swellH:weekAvgSwell,tidePhase:"incoming",pressure:weekAvgP,wmoCode:1,windDir:"S"};

    // by testing both "incoming" and "outgoing" and averaging — this removes the tide bias
    const weekSpeciesRanking=Object.keys(FISH).map(k=>{
      const sc1=scoreConditions(k,{...weekWx,tidePhase:"incoming"},weekMoonPhase);
      const sc2=scoreConditions(k,{...weekWx,tidePhase:"outgoing"},weekMoonPhase);
      const sc3=scoreConditions(k,{...weekWx,tidePhase:"low"},weekMoonPhase);
      const sc4=scoreConditions(k,{...weekWx,tidePhase:"high"},weekMoonPhase);
      const avgScore=Math.round((sc1.total+sc2.total+sc3.total+sc4.total)/4);
      // Build per-species condition notes: what's working for them this week
      const factors=sc1.factors;
      const goodFactors=factors.filter(f=>f.score>=7).map(f=>f.name.toLowerCase());
      const badFactors =factors.filter(f=>f.score<=4).map(f=>f.name.toLowerCase());
      return{key:k,label:FISH[k].label,icon:FISH[k].icon,score:avgScore,goodFactors,badFactors,sc:sc1};
    }).sort((a,b)=>b.score-a.score);
    currentWeekSpecies=weekSpeciesRanking;

  }catch(e){
    console.error("fetchConditions:",e);
    currentWeather={error:true,msg:e.message||String(e)};
  }
  render();
  if(currentWeather&&!currentWeather.error) fetchAI();
}

function fetchAI(){
  currentAI=buildFallback(currentWeather);
  render();
}

/* ═══════════════════════════════════════
   SEARCH — powered by Photon geocoder
   (komoot/photon, OpenStreetMap data)
   Searches all beaches across Australia.
   Attribution: © OpenStreetMap contributors
═══════════════════════════════════════ */
let searchDebounceTimer = null;

function onSearchInput(val){
  const q = val.trim();
  if(!q){ searchSuggestions=[]; dropdownVisible=false; renderDropdown(); return; }

  // Show instant local matches while waiting for API
  const localMatches = BEACHES.filter(b =>
    b.n.toLowerCase().includes(q.toLowerCase()) ||
    b.s.toLowerCase() === q.toLowerCase()
  ).slice(0,4).map(b=>({n:b.n, s:b.s, lat:b.lat, lon:b.lon, source:"local"}));

  if(localMatches.length){
    searchSuggestions = localMatches;
    dropdownVisible = true;
    renderDropdown();
  }

  // Debounce the API call — 350ms after typing stops
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => searchPhoton(q), 350);
}

async function searchPhoton(q){
  try {
    // Search Photon API — filter to Australia, bias to natural/beach/bay/coastal features
    // Multiple osm_tag params to catch beaches, bays, headlands, coves, reefs etc.
    const url = "https://photon.komoot.io/api/?q="
      + encodeURIComponent(q + " Australia")
      + "&countrycodes=au"
      + "&limit=8"
      + "&lang=en";

    const res = await fetch(url);
    if(!res.ok) return;
    const data = await res.json();

    const results = (data.features || [])
      .filter(f => {
        const p = f.properties || {};
        // Keep beaches, bays, coves, headlands, peninsulas, coastal features
        const keepTypes = ["beach","bay","cove","headland","peninsula","cape","point",
                          "harbour","harbor","inlet","lagoon","reef","island","coast"];
        const osmVal = (p.osm_value||"").toLowerCase();
        const osmKey = (p.osm_key||"").toLowerCase();
        const name   = (p.name||"").toLowerCase();
        const isCoastal = keepTypes.some(t => osmVal.includes(t) || name.includes(t));
        const isAU = (p.country_code||"").toLowerCase() === "au";
        return isAU && (isCoastal || p.osm_value === "beach");
      })
      .map(f => {
        const p = f.properties || {};
        const [lon, lat] = f.geometry.coordinates;
        // Build state abbreviation from OSM state field
        const stateMap = {
          "New South Wales":"NSW","Victoria":"VIC","Queensland":"QLD",
          "Western Australia":"WA","South Australia":"SA","Tasmania":"TAS",
          "Northern Territory":"NT","Australian Capital Territory":"ACT"
        };
        const stateRaw = p.state || "";
        const s = stateMap[stateRaw] || stateRaw.slice(0,3).toUpperCase() || "AU";
        const name = p.name || p.display_name || q;
        return { n:name, s, lat, lon, source:"photon",
                 subtitle: [p.city||p.county||"", stateRaw].filter(Boolean).join(", ") };
      })
      .slice(0,8);

    if(results.length){
      // Merge: Photon results first, then any local-only matches not already in results
      const photonNames = new Set(results.map(r=>r.n.toLowerCase()));
      const localOnly = searchSuggestions.filter(b =>
        b.source==="local" && !photonNames.has(b.n.toLowerCase())
      );
      searchSuggestions = [...results, ...localOnly].slice(0,8);
      dropdownVisible = true;
      renderDropdown();
    }
  } catch(e) {
    // Photon failed — keep showing local results silently
    console.warn("Photon geocoder unavailable:", e.message);
  }
}

function renderDropdown(){
  const dd=el("searchDropdown"); if(!dd)return;
  if(!dropdownVisible||!searchSuggestions.length){dd.style.display="none";return;}
  dd.style.display="block";
  dd.innerHTML = searchSuggestions.map((b,i)=>`
    <div class="dropdown-item" onclick="pickBeach(${i})">
      <span>${b.n}</span>
      <span class="badge" style="margin-left:6px">${b.s}</span>
      ${b.subtitle?`<small style="display:block;font-size:11px;color:rgba(255,255,255,.3);margin-top:1px">${b.subtitle}</small>`:""}
    </div>
  `).join("");
  // Attribution required by ODbL
  dd.innerHTML += `<div style="padding:6px 14px;font-size:10px;color:rgba(255,255,255,.2);border-top:.5px solid rgba(255,255,255,.06)">© OpenStreetMap contributors</div>`;
}

        currentAI.topTargets.forEach(target=>{

          html+=`<div class="card"><div class="fish-card">

              <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
                <button onclick="openFishModal('${key}')" style="background:rgba(255,255,255,.05);border-radius:8px;padding:6px 8px;flex-shrink:0;border:none;cursor:pointer;transition:all .2s" onmouseenter="this.style.background='rgba(0,212,170,.15)'" onmouseleave="this.style.background='rgba(255,255,255,.05)'">${SPECIES_SVGS[key]||''}</button>

              </div>

            </div>
            <div style="text-align:right;min-width:120px">
              <div style="font-size:10px;color:rgba(255,255,255,.28);margin-bottom:4px;letter-spacing:.07em">BEST TIME</div>

    if(currentTab==="tides"&&currentTides){
      const tideList = currentTides.tides;

      const sourceColor = isAccurate ? "rgba(0,212,170,.7)" : "rgba(255,200,0,.6)";

      } else {
        const nowMins = new Date().getHours()*60 + new Date().getMinutes();
        const toMins  = t => { const [hh,mm]=t.split(":").map(Number); return hh*60+mm; };

        // ── RULE OF TWELFTHS + GOLDEN WINDOWS ──────────────────
        // Rule of Twelfths: tide movement per hour as fraction of total range
        // Hour 1: 1/12, Hour 2: 2/12, Hour 3: 3/12, Hour 4: 3/12, Hour 5: 2/12, Hour 6: 1/12
        const TWELFTHS = [1,2,3,3,2,1];
        const toMinsLocal = t => { const [hh,mm]=t.split(":").map(Number); return hh*60+mm; };

        // Build hourly flow data between each tide pair
        const flowBars = [];

          const t1m=toMinsLocal(t1.time), t2m=toMinsLocal(t2.time);
          const dur=t2m-t1m; // minutes for this half-cycle
          const isRising=t2.type==="High";
          const totalRange=Math.abs(t2.h-t1.h);
          let elapsed=0;
          TWELFTHS.forEach((fraction,hr)=>{
            const startMins=t1m + elapsed;
            const durHr = (dur/6);
            const movementM = (fraction/12)*totalRange; // metres moved this hour
            flowBars.push({
              startMins,
              endMins:startMins+durHr,
              fraction,
              movementM:movementM.toFixed(2),
              isRising,
              isPeak:fraction===3,
              isSlack:fraction===1,
            });
            elapsed+=durHr;

        // Sunrise/sunset from today's forecast
        const todayFc = currentWeekForecast?.[0];
        const sunriseM = todayFc?.sunrise ? toMinsLocal(todayFc.sunrise) : null;
        const sunsetM  = todayFc?.sunset  ? toMinsLocal(todayFc.sunset)  : null;
        const moonriseM = currentMoon?.moonrise ? toMinsLocal(currentMoon.moonrise) : null;
        const moonsetM  = currentMoon?.moonset  ? toMinsLocal(currentMoon.moonset)  : null;

        // Detect Golden Windows: tide change (peak flow) overlapping with low-light events
        const goldenWindows = [];

          sunriseM!==null ? {m:sunriseM, label:"🌅 Dawn", color:"#FACC15"} : null,
          sunsetM!==null  ? {m:sunsetM,  label:"🌇 Dusk", color:"#FB923C"} : null,
          moonriseM!==null ? {m:moonriseM, label:"🌕 Moonrise", color:"#A78BFA"} : null,
          moonsetM!==null  ? {m:moonsetM,  label:"🌑 Moonset",  color:"#818CF8"} : null,
        ].filter(Boolean);

        // A Golden Window fires when a peak-flow hour (3/12) is within 90 mins of a low-light event
        flowBars.forEach(bar=>{
          if(!bar.isPeak) return;
          const barCentre = (bar.startMins+bar.endMins)/2;
          lowLightEvents.forEach(evt=>{
            const diff = Math.abs(barCentre - evt.m);
            if(diff<=90){
              // Check not already added for this event
              if(!goldenWindows.find(g=>g.eventLabel===evt.label)){
                const startH=Math.floor(bar.startMins/60).toString().padStart(2,"0");
                const startMin=(bar.startMins%60).toFixed(0).padStart(2,"0");
                const endH=Math.floor(bar.endMins/60).toString().padStart(2,"0");
                const endMin=(bar.endMins%60).toFixed(0).padStart(2,"0");
                goldenWindows.push({
                  eventLabel:evt.label,
                  color:evt.color,
                  timeStr:`${startH}:${startMin}–${endH}:${endMin}`,
                  tide:bar.isRising?"Incoming":"Outgoing",
                  movement:`${bar.movementM}m/hr`,
                });
              }
            }
          });
        });

        // SVG Rule of Twelfths bar chart
        const barW=Math.floor(480/Math.max(flowBars.length,1));
        const barMaxH=60;
        const svgTW=Math.max(480, flowBars.length*barW);

        html+=`<div class="card" style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;flex-wrap:wrap;gap:6px">

            <div style="font-size:10px;color:rgba(255,255,255,.22)">${tzLabel}</div>
          </div>
          <p style="font-size:11px;color:rgba(255,255,255,.38);margin-bottom:14px;line-height:1.5">Each bar = one hour of tide. The middle two hours move the most water — and the most bait. Taller bars = faster current = active feeding fish.</p>

          <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
            <svg viewBox="0 0 ${svgTW} 110" style="width:100%;min-width:300px;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">
              <!-- Background grid lines -->
              ${[1,2,3].map(n=>`<line x1="0" y1="${10+barMaxH*(1-n/3)}" x2="${svgTW}" y2="${10+barMaxH*(1-n/3)}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`).join("")}

              <!-- Flow bars -->
              ${flowBars.map((b,i)=>{
                const barH = (b.fraction/3)*barMaxH;
                const y = 10+barMaxH-barH;
                const x = i*barW+2;
                const w = barW-4;
                const isNow = nowMins>=b.startMins && nowMins<b.endMins;
                const isPast = nowMins>=b.endMins;
                const barColor = b.isPeak?(b.isRising?"#00D4AA":"#4ADE80"):b.isSlack?"rgba(255,255,255,.25)":b.isRising?"rgba(0,212,170,.55)":"rgba(74,222,128,.5)";
                const opacity = isPast?"0.35":"1";
                return `
                <rect x="${x}" y="${y}" width="${w}" height="${barH}" rx="2"
                  fill="${barColor}" opacity="${opacity}"/>
                ${isNow?`<rect x="${x}" y="${y}" width="${w}" height="${barH}" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity=".8"/>`:``}
                ${b.isPeak?`<text x="${x+w/2}" y="${y-4}" text-anchor="middle" fill="${barColor}" font-size="7" font-family="sans-serif" font-weight="bold">PEAK</text>`:""}
                <text x="${x+w/2}" y="82" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="7" font-family="sans-serif">${Math.floor(b.startMins/60).toString().padStart(2,"0")}:${(b.startMins%60).toFixed(0).padStart(2,"0")}</text>
                <text x="${x+w/2}" y="94" text-anchor="middle" fill="${isPast?"rgba(255,255,255,.15)":"rgba(255,255,255,.45)"}" font-size="7.5" font-family="sans-serif">${b.movementM}m</text>`;
              }).join("")}

              <!-- Now line -->
              ${(()=>{
                const nowBar=flowBars.findIndex(b=>nowMins>=b.startMins&&nowMins<b.endMins);
                if(nowBar<0) return "";
                const ratio=(nowMins-flowBars[nowBar].startMins)/(flowBars[nowBar].endMins-flowBars[nowBar].startMins);
                const nx=nowBar*barW + ratio*barW;
                return `<line x1="${nx}" y1="0" x2="${nx}" y2="78" stroke="rgba(255,255,255,.5)" stroke-width="1.5" stroke-dasharray="3,3"/>
                <polygon points="${nx-4},0 ${nx+4},0 ${nx},5" fill="rgba(255,255,255,.5)"/>
                <text x="${nx+5}" y="12" fill="rgba(255,255,255,.45)" font-size="8" font-family="sans-serif">NOW</text>`;
              })()}

              <!-- Low-light event markers -->
              ${lowLightEvents.map(evt=>{
                const evtBar=flowBars.findIndex(b=>evt.m>=b.startMins&&evt.m<b.endMins);
                if(evtBar<0) return "";
                const ratio=(evt.m-flowBars[evtBar].startMins)/(flowBars[evtBar].endMins-flowBars[evtBar].startMins);
                const ex=evtBar*barW+ratio*barW;
                return `<line x1="${ex}" y1="0" x2="${ex}" y2="78" stroke="${evt.color}" stroke-width="1" stroke-dasharray="2,2" opacity=".7"/>

            </svg>
          </div>

            <div style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,.25);display:inline-block"></span><span style="font-size:10px;color:rgba(255,255,255,.4)">Slack water</span></div>
          </div>
        </div>`;

        // ── GOLDEN WINDOWS ──────────────────────────────────────
        html+=`<div class="card" style="margin-bottom:16px;background:rgba(250,204,21,.04);border-color:rgba(250,204,21,.15)">
          <div style="font-size:10px;letter-spacing:.1em;color:rgba(250,204,21,.7);margin-bottom:12px">✨ GOLDEN WINDOWS — PEAK FEEDING INTERSECTIONS</div>`;

        if(goldenWindows.length){
          html+=`<p style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:12px;line-height:1.6">Where peak tidal flow (hours 3–4 of the cycle) intersects with dawn, dusk, moonrise or moonset. These overlaps trigger the most aggressive feeding responses of the day.</p>`;
          html+=`<div style="display:flex;flex-direction:column;gap:10px">`;
          goldenWindows.forEach(g=>{
            html+=`<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border-radius:10px;padding:12px 14px;border:.5px solid ${g.color}44">

                <div style="font-size:10px;font-weight:700;color:${g.color}">GO FISH</div>
                <div style="font-size:9px;color:rgba(255,255,255,.3);margin-top:1px">HIGH ALERT</div>
              </div>
            </div>`;
          });
          html+=`</div>`;
        } else {
          html+=`<p style="font-size:13px;color:rgba(255,255,255,.45);line-height:1.6">No peak-flow / low-light overlaps today. Peak flow hours don't align with dawn, dusk or moonrise/moonset. Fish the peak flow windows anyway — they still move more bait than slack water.</p>`;
        }
        html+=`</div>`;

        html+=`<div style="font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.28);margin-bottom:10px">TODAY'S TIDES · ${tzLabel}</div>`;

              </div>
              <div style="font-size:22px;font-weight:500;${isPast&&!isNext?"opacity:.45":""}">${t.time}</div>

            <div style="font-size:24px;font-weight:300;${isPast&&!isNext?"opacity:.45":""}color:${t.type==="High"?"#00D4AA":"rgba(255,255,255,.5)"}">${t.h}m</div>
          </div>`;

        html+=`<p style="font-size:10px;color:rgba(255,255,255,.18);margin-top:4px">Tides: Open-Meteo Copernicus marine model · ${tzLabel} · <a href="http://www.bom.gov.au/oceanography/tides/" target="_blank" style="color:rgba(255,255,255,.3)">BOM navigation tables</a></p>`;

    if(currentTab==="moon"&&currentMoon){
      const m = currentMoon;
      const nowMins = new Date().getHours()*60 + new Date().getMinutes();
      const toM = s => { if(!s) return -1; const [h,mm]=s.split(":").map(Number); return h*60+mm; };

      // Moon phase arc SVG
      const phaseAngle = m.phase * 360;
      const moonSvg = `<svg viewBox="0 0 80 80" width="80" height="80">
        <circle cx="40" cy="40" r="34" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
        <text x="40" y="48" text-anchor="middle" font-size="32">${m.emoji}</text>
      </svg>`;

      // Phase progress bar (0=new, 0.5=full, 1=new again)
      const pct = Math.round(m.phase * 100);

      html+=`<div style="display:flex;flex-direction:column;gap:14px">`;

      // Moon phase card
      html+=`<div class="card card-teal">
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div style="flex-shrink:0">${moonSvg}</div>

      html+=`<p style="font-size:13px;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:16px">Ranked on water temperature, wind, swell and barometric pressure forecast — <strong style="color:rgba(255,255,255,.6)">not tide-dependent</strong>. The best time to target each species depends on tide phase — check the <strong style="color:rgba(255,255,255,.6)">Tides</strong> and <strong style="color:rgba(255,255,255,.6)">Moon &amp; Bites</strong> tabs for today's optimal windows.</p>`;
      html+=`<div style="display:flex;flex-direction:column;gap:10px">`;
      top5.forEach((sp,i)=>{
        const isTop=i===0;
        const rankColor=i===0?"#00D4AA":i===1?"#4ADE80":i===2?"#60A5FA":"rgba(255,255,255,.45)";
        const rankBg=i===0?"rgba(0,212,170,.07)":i===1?"rgba(74,222,128,.05)":"rgba(255,255,255,.03)";
        const rankBorder=i===0?"rgba(0,212,170,.2)":i===1?"rgba(74,222,128,.15)":"rgba(255,255,255,.07)";
        const sp_conds=SPECIES_CONDITIONS[sp.key];
        // Build a concise "what's working / what to watch" line
        const goodStr=sp.goodFactors.length?sp.goodFactors.slice(0,2).join(" & ")+" are favourable":"";
        const badStr =sp.badFactors.length ?"watch "+sp.badFactors.slice(0,1).join(""):"";
        const condLine=[goodStr,badStr].filter(Boolean).join(" · ");
        // Key conditions tip for this species
        const tip=sp_conds?sp_conds.notes:"";
        html+=`<div style="background:${rankBg};border:.5px solid ${rankBorder};border-radius:12px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start">`;
        // Rank badge
        html+=`<div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:36px">`;
        html+=`<div style="background:rgba(255,255,255,.05);border-radius:8px;padding:5px 7px">${SPECIES_SVGS[sp.key]||''}</div>`;
        html+=`<div style="font-size:11px;font-weight:700;color:${rankColor}">#${i+1}</div>`;
        html+=`</div>`;
        // Content
        html+=`<div style="flex:1;min-width:0">`;
        html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">`;
        html+=`<span style="font-size:16px;font-weight:700;color:${rankColor}">${sp.label}</span>`;
        html+=`${dots(sp.score,5)}`;
        html+=`</div>`;
        if(condLine) html+=`<div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:5px">${condLine}</div>`;
        if(tip) html+=`<div style="font-size:12px;color:rgba(255,255,255,.38);line-height:1.55;font-style:italic">"${tip}"</div>`;
        // Optimal conditions summary pills
        if(sp_conds){
          html+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">`;
          html+=`<span style="background:rgba(255,255,255,.05);border-radius:6px;padding:2px 8px;font-size:11px;color:rgba(255,255,255,.45)">&#127777; ${sp_conds.waterTemp.ideal[0]}–${sp_conds.waterTemp.ideal[1]}°C</span>`;
          html+=`<span style="background:rgba(255,255,255,.05);border-radius:6px;padding:2px 8px;font-size:11px;color:rgba(255,255,255,.45)">&#128168; &lt;${sp_conds.wind.idealMax}km/h wind</span>`;
          html+=`<span style="background:rgba(255,255,255,.05);border-radius:6px;padding:2px 8px;font-size:11px;color:rgba(255,255,255,.45)">&#127754; &lt;${sp_conds.swell.idealMax}m swell</span>`;
          const bestTide=sp_conds.tides.best.map(t=>t.charAt(0).toUpperCase()+t.slice(1)).join(" / ");
          html+=`<span style="background:rgba(0,212,170,.06);border-radius:6px;padding:2px 8px;font-size:11px;color:rgba(0,212,170,.7)">Best tide: ${bestTide}</span>`;
          html+=`</div>`;
        }
        html+=`</div>`; // content
        html+=`</div>`; // row
      });
      html+=`</div></div>`;
    }

    // Barometer legend
    html+=`<div id="baro-guide" class="card card-teal" style="margin-top:16px">
      <div style="font-size:10px;letter-spacing:.12em;color:rgba(0,212,170,.55);margin-bottom:10px">BAROMETER GUIDE</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">
        ${[
          {icon:"⬇⬇",label:"Falling Fast",color:"#00D4AA",desc:"Pre-frontal drop — peak feeding. Fish aggressively before the front hits."},
          {icon:"⬇",label:"Falling",color:"#4ADE80",desc:"Pressure dropping — fish become more active. Fast lures work well."},
          {icon:"→",label:"Stable",color:"rgba(255,255,255,.5)",desc:"Normal conditions. Use proven techniques for your target species."},
          {icon:"⬆",label:"Rising",color:"#FACC15",desc:"Post-frontal. Fish settling deeper. Slow finesse presentations."},
          {icon:"⬆⬆",label:"Rising Fast",color:"#F87171",desc:"24–48hr slowdown after front. Try deeper water, slow techniques."},
        ].map(b=>`<div style="background:rgba(255,255,255,.03);border-radius:8px;padding:9px 10px"><div style="font-size:12px;font-weight:600;color:${b.color};margin-bottom:3px">${b.icon} ${b.label}</div><div style="font-size:11px;color:rgba(255,255,255,.38);line-height:1.5">${b.desc}</div></div>`).join("")}
      </div>
    </div>`;
    html+=`</div>`;
  }

  return html;
}

function renderForecast(){
  let html=`<div class="fade-up" style="margin-bottom:28px"><div class="section-label">7-DAY OUTLOOK</div><div class="section-title">Week Ahead</div><p class="section-sub">Real 7-day forecast with barometric pressure, fishing rating &amp; top target species</p></div>`;
  if(!currentLocation){
    return html+`<div class="card" style="text-align:center;padding:44px"><p style="color:rgba(255,255,255,.32);margin-bottom:16px">Search a beach on the Conditions page first</p><button class="btn" onclick="setView('home')">Find a Beach →</button></div>`;
  }
  if(!currentWeekForecast){
    return html+`<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-label">LOADING FORECAST</div></div>`;
  }

  // Helper: barometer trend label, icon, colour
  function baroLabel(trend, pressure){
    const map={
      falling_fast: {label:"Falling Fast", icon:`<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M8 2v10M4 8l4 6 4-6" stroke="#00D4AA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M8 2v10M4 8l4 6 4-6" stroke="#00D4AA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`, color:"#00D4AA", bg:"rgba(0,212,170,.1)", note:"Pre-frontal — peak feeding"},
      falling:      {label:"Falling",      icon:`<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M8 2v10M4 8l4 6 4-6" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`, color:"#4ADE80", bg:"rgba(74,222,128,.1)", note:"Fish become active"},
      stable:       {label:"Stable",       icon:`<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M2 8h12M10 4l4 4-4 4" stroke="rgba(255,255,255,.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`, color:"rgba(255,255,255,.5)", bg:"rgba(255,255,255,.05)", note:"Normal feeding"},
      rising:       {label:"Rising",       icon:`<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M8 14V4M4 8l4-6 4 6" stroke="#FACC15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`, color:"#FACC15", bg:"rgba(250,204,21,.1)", note:"Fish settling down"},
      rising_fast:  {label:"Rising Fast",  icon:`<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M8 14V4M4 8l4-6 4 6" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M8 14V4M4 8l4-6 4 6" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`, color:"#F87171", bg:"rgba(248,113,113,.1)", note:"Post-frontal slowdown"},
    };
    return map[trend]||map.stable;
  }

  html+=`<div style="margin-bottom:14px;font-size:14px;color:rgba(255,255,255,.42)">${currentLocation.n} <span class="badge">${currentLocation.s}</span></div>`;
  html+=`<div style="display:flex;flex-direction:column;gap:12px">`;

  currentWeekForecast.forEach((day,idx)=>{
    if(idx===0) return; // Today shown in Conditions tab
    const isToday=false;
    const baro=baroLabel(day.pressureTrend, day.avgPressure);
    html+=`<div class="card">`;
    // ── Top row: day + weather summary ──
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap">`;
    html+=`<div style="display:flex;align-items:center;gap:12px">`;
    html+=`<div style="min-width:44px"><div style="font-weight:700;font-size:17px">${day.day}</div><div style="font-size:11px;color:rgba(255,255,255,.3)">${day.date}</div></div>`;
    html+=`<div><div style="font-size:14px;margin-bottom:3px">${day.condIcon} ${day.condition}</div><div style="font-size:12px;color:rgba(255,255,255,.35)">${day.wind}km/h ${day.windDir} (${beaufort(day.wind).short}) · ${day.swellMax?day.swellMax+'m swell':'—'} · ${day.rain+'mm rain'}</div></div>`;
    html+=`</div>`;
    html+=`<div style="display:flex;align-items:center;gap:8px"><div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;text-align:right;margin-bottom:3px">FISHING</div>${dots(day.rating,5)}</div>`;
    html+=`</div>`;

    // ── Stats row: temp, pressure, baro trend ──
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">`;
    // Temp
    html+=`<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:4px;letter-spacing:.06em">TEMP</div>
      <div style="font-size:16px;font-weight:500">${day.tempH}°<span style="font-size:13px;color:rgba(255,255,255,.35);font-weight:400"> / ${day.tempL}°</span></div>
    </div>`;
    // Pressure
    html+=`<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:4px;letter-spacing:.06em">PRESSURE</div>
      <div style="font-size:16px;font-weight:500">${day.avgPressure?day.avgPressure+" hPa":"—"}</div>
    </div>`;
    // Baro trend — clickable, scrolls to guide
    html+=`<button onclick="document.getElementById('baro-guide')?.scrollIntoView({behavior:'smooth',block:'start'})" style="background:${baro.bg};border-radius:10px;padding:10px 12px;border:.5px solid ${baro.color}33;text-align:left;cursor:pointer;font-family:inherit;color:#E8EDF2;width:100%;transition:all .2s" onmouseenter="this.style.borderColor='${baro.color}88'" onmouseleave="this.style.borderColor='${baro.color}33'">
      <div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;margin-bottom:6px">BAROMETER</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">${baro.icon}<span style="font-size:12px;font-weight:600;color:${baro.color}">${baro.label}</span></div>
      <div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:2px">${baro.note}</div>
    </button>`;
    html+=`</div>`;

    // ── Top 3 fish ──
    if(day.topFish&&day.topFish.length){
      html+=`<div style="border-top:.5px solid rgba(255,255,255,.07);padding-top:12px">`;
      html+=`<div style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.08em;margin-bottom:8px">TOP TARGETS</div>`;
      html+=`<div style="display:flex;gap:8px;flex-wrap:wrap">`;
      day.topFish.forEach((f,fi)=>{
        const rankColor=fi===0?"#00D4AA":fi===1?"#4ADE80":"rgba(255,255,255,.45)";
        const rankBg=fi===0?"rgba(0,212,170,.1)":fi===1?"rgba(74,222,128,.08)":"rgba(255,255,255,.04)";
        const rankBorder=fi===0?"rgba(0,212,170,.25)":fi===1?"rgba(74,222,128,.18)":"rgba(255,255,255,.08)";
        html+=`<div style="background:${rankBg};border:.5px solid ${rankBorder};border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;flex:1;min-width:90px">`;
        html+=`<div style="flex-shrink:0">${SPECIES_SVGS[f.key]||''}</div>`;
        html+=`<div><div style="font-size:13px;font-weight:600;color:${rankColor}">${f.label}</div>${dots(f.score,5)}</div>`;
        html+=`</div>`;
      });
      html+=`</div></div>`;
    }

    html+=`</div>`;
  });

  html+=`</div>`;

  // Legend
  html+=`<div id="baro-guide" class="card card-teal" style="margin-top:16px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px">
      ${[
        {icon:"⬇⬇",label:"Falling Fast",color:"#00D4AA",desc:"Best feeding window. Pre-frontal pressure drop triggers aggressive feeding in almost all species."},
        {icon:"⬇",label:"Falling",color:"#4ADE80",desc:"Good conditions. Fish become more active as pressure drops. Fast lures and moving baits work well."},
        {icon:"→",label:"Stable",color:"rgba(255,255,255,.5)",desc:"Normal fishing. Stick with proven techniques and locations for your target species."},
        {icon:"⬆",label:"Rising",color:"#FACC15",desc:"Fish settling back to normal depth after a front. Slower presentations and finesse techniques work better."},
        {icon:"⬆⬆",label:"Rising Fast",color:"#F87171",desc:"Post-frontal. Many species lethargic for 24–48hrs. Try deeper water and slow presentations."},
      ].map(b=>`<div style="background:rgba(255,255,255,.03);border-radius:8px;padding:10px">
        <div style="font-size:12px;font-weight:600;color:${b.color};margin-bottom:4px">${b.icon} ${b.label}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.4);line-height:1.5">${b.desc}</div>
      </div>`).join("")}
    </div>
    <div style="margin-top:12px;font-size:11px;color:rgba(255,255,255,.3);line-height:1.6">Fish ratings factor in wind, swell, rain, barometric trend and moon phase. Top species shown for each day using the same 8-factor scoring engine as the Conditions page. Data: Open-Meteo.</div>
  </div>`;

  return html;
}
